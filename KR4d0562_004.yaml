body:
  text: 石初集卷四元周霆震撰五言律詩憂懷黃落雜烟蕪林炊乍有無喪氛移步滿兵氣幾時蘇小邑疲封拜窮鄉落饋輸劫深資病減間坐校靈樞老病喪亂交遊盡艱難老病深寥寥平世䇿落落古人心夕照驚岐路晨霜憶故林折腰寧五斗敝帚或千金山村寥落驚回首艱危厭久生野人羞費揖山石苦留行坡雨初畦菜園霜未破橙小村風物古暫喜話農耕喜康子至幼兒淹滯劉氏館中夜劫者壞大門而入急呼宿客父子起走出遇冦二客趨東廂影堂冦追躡之父死子傷吾兒趨西廂匿神龕側幸免死生之異在毫髮間於其來也且喜且悲脫或淪鋒刃吾年豈願餘及今相見日是汝有生初割愛三兄愧慿危一飯驅風塵方未巳尚慎母恩劬憶第三兒留郡城百里元非逺三春又已終傳聞隨處有消息幾時通蔓草酣朝露孤花繫晚風昨逢歸客語前日早趨洪挽吉水孫碧澗判院嗣世明經業傳家晝錦衣干戈危獨立桑梓晚全歸逺戍孤雲淡平原落日微送車淚交灑霜葉不成飛送人之嶽陽稅務五月巴陵去官途事若何通商川舶逺供貢楚材多澤國留形勝湖廣參政阿思蘭駐兵嶽陽騷人續詠歌時逢漁艇問或有化龍梭張德彥德彥自金陵敗中附趙餘黨遡流將扺安慶趙子變起其父鎮安慶陳疑其通金陵師行之際戮之守者倉皇東下德彥同行識之急投脫命趙舟四十六人皆死歸道所以聞者悚然跋涉逾千里存亡間一舟絶憐干祿誤翻致遺親憂水國寒潮晚山城古木秋行藏盍深省嚮晦庶無尤辛丑除夕雨雪徂年日乾坤厭亂餘戰爭吳㑹阻消息朔風虛虎眩投眢井燐寃集故墟事機恆倚伏天意竟何如壬寅旦日衰遲違故里喪亂守殘編鞍馬兒童習貂璫牧圉聯問春逢上日頒朔憶當年懶復談迎送焚香校太𤣥閔新安路泣顛微步原塗枕積骸孫恩將入海新安寨主孫本立李祐起平淮紅巾首李昭奔潰蛾投火攀援蟻附崖熊兵聞禁暴坐覺衆心懷關隴吟隴戍通恆代河關控魯齊日經亡國淡天入戰場低玉帳千羊酪青郊萬馬蹄悲歌頻勸酒送客去安西冦至羣醜發禾川中宵羽檄傳才收緣岸戌已漲近城烟掠貨舟相次驅人騎獨先兒孫猶九口兩地寸心懸雜詠三首海宇久承平風塵忽四驚官僚生間道黎庶死乘城壯士天山箭將軍細栁營寥寥千載事憂世與誰評穎蔡俄中起荆襄轉盼休兵符留北府臣節仗南州萬宇聲華劫千官富貴羞聖恩覃雨露未必乏嘉猷所至失堅城宜令鼠輩輕茫茫誰報國草草衆興兵吳楚懸三户河山隔上京幾時蘇北望飛騎報塵清即事古驛深春雨荒城帶落暉雞豚當道泯烟火隔江微所過無完室相逢盡短衣干戈承劫運暫與聖恩違羅郭首義羅明逺傾家郭楚金俊功隨日起遺恨與年深白日重泉影青天萬古心如何有位者翻不計浮沈感遇病髮梳頻減愁根日夜新世方迷貨色天未厭風塵臣分誰憂國君心本愛民歲寒餘徑草灑血贑江濱七言律詩秋日登城山壓孤城草樹荒西風塵起獨倣徨蕭條遺構重燒毁憔悴餘民半殺傷驛傳共疑星使杳角聲空引鴈愁長書生往往談經濟攬轡澄清合有方答劉持志關山極目翳黃埃歎息車薪水一杯種秫地荒賓少顧催租邑小吏頻來暗塵葛服秋當浣細雨柴門晚未開近日江南吟思減斷腸誰更憶方回答道原思治書生報國乏涓埃羞對茱萸强舉杯宿霧連山雄虺些朔風何日野鷹來交游漸向艱危盡懷抱那能老病開幾度出門疑所適杖藜細繞竹西回雨五月初七日雨至初九夕大作一晝夜如傾初十夜半更許方止江漲比丁已有加濕雲無際漲痕粘雨勢朝來幾倍添已讓滄溟懷絶島更輸銀漢建高簷三年兵甲天當洗一日蛟龍地莫淹早泛賈船隨鬬艦廣通民食富官鹽寄吳章臥病客中亂山岐路鴈行斜籬落酣烟菊自花我昔郡城行冒雨君今孤館臥思家濟時孰是囊中穎避地除非海上槎一郡幸存唯二邑戍樓何日罷吹笳城陷黃塵赤日陷城池又到冰霜歲晏時列寨守江兵夜戍揚旗出郭冦朝馳就粱誤落荒田鴈啄肉空肥野樹鴟諸將從容依老守捷書但奏莫令遲梁侯守郡惡聞兵敗感秋鬢如踈葉挂林端帶減腰圍逐月寬久病秋深心易怯多愁夜永夢難安暗蛩入戶輸清苦落月窺窗進薄寒屈指青春平野望東風隨意馬頭看九日西風慘淡郡城樓誰復黃花插滿頭訪舊愁經墟落晚登高怕見戰場秋鳴鸞閣在金笳集戲馬臺空鳥鼠留尚欲逺尋雷煥友提攜雙劒出南州荒荒萸菊負登臨莽莽乾坤亘古今淮浪逆舟寒日淡楚山連戌暮雲深孤生自滴思親淚先父宋淳祐九年九月九日生多難誰攄報國心道路幾時辭逆旅關河無地避秋砧送韓一初赴馬萬户府參議才俊宜從幕府升四郊何日保安寧連營未報休傳箭䇿馬何嫌出戴星苦戰城壕霜月白屢殘村落野烟青軍民甚有關心處佐政行看刃發硎登城世祖艱難德澤深風悲城郭怕登臨九朝天下俄川决七載江南竟陸沈馬首空傳當日價雞聲不到暮年心雨闕門外青青草過客魂消淚滿襟民哀痛哭羣庸誤主恩遺民無路叩天閽荒涼甲第有焦土倉卒深閨無固門青血傳餐供士卒黃金為土贖兒孫囊膠誰造崑崙頂念此長河駭浪渾除夜感念亡室無復憐余踏雪回一燈兒女促行杯土寒深痛骨委絶月暗忽迷魂去來遲暮影孱如欲踣顛危心死不成哀鬢邊種種君知否消得流年幾度催中秋夢逺霓裳世外音漢宮天老桂香沈黃埃欲出飛鳶上白骨猶如落葉深萬國砧聲離别淚中宵月色太平心晉公相業何時見目斷天津益苦吟風雨重陽八載兵戈苦未休異鄉佳節若為酬鷹臺人化前千載鴈塞書沈外九州風雨黃花宜換世山林白髮欲專秋莫言抱病妨杯酌漸喜新來絶酒讐冰盤雪藕清徹冰盤壓蔗漿酒酣雪藕進華堂凝寒色映瑤華脆真白絲連翠袖香金掌曽聞承玉露瓊臺忽見搗𤣥霜文園近日真消渴莫種蓮根引恨長元日雪朔雪遙憎毒霧蒸兩年元日勢慿陵氣吞鶴表城如玉聲撼龍宮海欲冰不夜與天為汗漫當春借地示嚴凝貂裘公子來何暮好向寒空縱角鷹新正雨雪連綿人日大霧近午晴天賜春晴一日恩亂來骨肉幾家存屢危豈望全腰領積善當知及子孫喜有帆檣通白下幸無車馬到青門往時百萬蒼生苦歲晚承平擬細論中秋城西感興玉宇瓊樓三萬里乘槎無路匪仙才塵揚海內衣冠盡鴈斷雲邊鼓角哀天意未知何日定月華空似昔年來故山老桂無消息紅蓼花高滿路開雨困簡張梅間濕薪萬竈漲烟氛屋角鳴鳩旦夕聞山接雲根如棧道雨生波暈似犀紋麥苗泥漬連千頃花信寒消到幾分最苦相從巷南北掩窗十日斷論文和前韻天氣渾疑挾楚氛雨淫愁向早春聞紅淹小圃違芳信緑泛回塘亂縠紋逺樹鳥飛村舍沒淡烟人立野橋分空餘落塈鄰翁璧顛倒蝸涎似篆文紀事八月十五日告示詰朝往攻新安孫本立晡時羣黨爭出城中撞擊居民門户壕外縱掠水東永和邊江而上放火殺人劫取財物婦女火達旦不滅是夜白氣亘天橫亘東西白氣升喧傳入夜事堪驚縱焚倳刃連村市流血呼寃逼郡城天地豈忘心憯怛山河未放影分明提攜婦女閨房秀飲涕羣驅敢出聲和青華道士蕭宗元月滿虛堂奏帝歸仙風吹送紫雲衣九還欲致三花聚一悟能消萬劫非老樹鶴棲存夜氣清池魚躍見天機黃冠况得山陰客未信詩盟與願違九日未霜白鴈渺關河來日空隨赴海波世難持身高處怯秋聲入耳老來多山中甲子今誰在日下長安奈逺何幾度西風餘破帽悠悠心事唾壺歌和劉子贄韻夢中走馬上西涼回首燕山六月霜尚想築臺思郭隗誰能薦士效田光三陲吳楚人才劣百戰河山事㑹長賴有淮南招隱處掩窗清晝坐焚香立秋京洛風塵竟未休送迎馬上敝貂裘蕭條人物常如夕慘淡乾坤又入秋勑使經年遺北府戰場近日在南州紛紛雞鶩羣爭食誰向滄江友白鷗冦來自北見城中蕭然散入村落斷鴈雲低欲度遲鵲巢何許寄南枝冦兵已厭空城住官馬猶從間道馳萬骨白邊寒月夜孤烟青處夕陽時經年北道無消息望眼頻穿淚暗埀幽憤隴梅驛信杳如緘白晝連山霧氣酣細栁未應同灞上藍田自可轉關南驚濤四面輕帆破疑路千條老驥諳落落懷才宜不少冥冥當局得無慙詔至三月二十六日天詔自廣東來詔發京師去年八月二十七日也於是朝廷號令久不聞矣欣幸之極敬賦七言律詩一首沈陸如雲跬步艱忽傳驛信自燕山九霄日御龍光起萬里春乘海道還忠義銘心扶壯節老癃埀涕洗愁顏中原黎庶知何似想望疏恩溥蒯菅次韻劉道原九日曠劫何當洗壒埃凌高欲藉海為杯巫山雨暗猿相引汾水雲深鴈不來新釀偶慿茅舍漉寒花時向槿籬開仲宣幸有荆州託未厭吟邊數往回喜東宮受冊六月二日東宮受冊越八日大赦天下使臣出湖廣來自茶陵十月十有一日到郡踴躍快覩不覺情發於聲忘其為老病也海色穿林曉夢圓戰塵氛霧一時湔青宮德進瑤編紀紫禁恩隨玉漏傳洛邑車書符永世漢家日月覲中天秋霜一寸丹心在稽首洪禧萬億年全參政九日宴僚佐城西神岡參謀萬德躬賦詩五首用韻寓情畫省凝香被羽林賞心寧許二毛侵閭閻側聽歌謠起父老爭看􅙶㦸臨霜露黃花留歲晏江湖白鴈待秋深宴闌歸騎營門夕涼月紛紛落醉襟能賦登高幕府親深秋過雨絶飛塵山城驛路黃柑富水寨人家白粲新歌舞多非前日境交游半是異鄉人通商近喜官鹽集不比西都巧算緡如雲冠蓋此高攀千載龍山季孟間犀筯駝峰傳翠釜銀罌春色照蒼灣歌姬擁醉翻腔誤才士爭先覓句艱秪有相如欣授簡興來無物不相關蘭臺無分珮珊珊斷壟平岡自往還避地亂來猶有酒放懷高處不須山參差紅樹西風外明滅青烟落照間何日逺尋方外友却隨紫氣出函關曽向凌波賦襪塵絶交近日愧錢神百年撫事皆陳迹四海知心幾故人山借衣冠違世濁天留萸菊貸秋貧偶尋五栁先生傳自覺年來懶是真懷古關河渺渺幾浮沈落日秋風萬古心二頃留人輕六國一壺玩世重千金亂來耆舊傳聞泯老去英雄悔恨深輸與蘇門長嘯者不教車馬涴山林贈張梅間故人誰似此君賢涉難交情晚更堅迂路出城尋故友移牀就月話當年霓裳曲奏忘天上博望槎回記海邊歸去蓴鱸隨地有别來鬚鬢得秋先九日遣懷繞籬黃菊自幽香無復龍山落帽狂身外老來從雜遝眼前高處倍淒涼妖狐突過荒城雨旅鴈冥飛絶塞霜風物關心倦回首野園柑熟旋分嘗還鄉初度辱親友劉盧南惠詩依韻答之憔悴還鄉一病翁雪窗晴透校參同庚寅俯誦湘纍語甲子長懷晉士風塵暗衣冠情索莫眼青骨肉誼深崇新吟多謝耆年頌晚節終慚老圃容至正十二年壬辰正月武昌失守黃鶴樓前帝子宮古來形勝控江東運籌要害無豪俊流禍顛崖總冦戎天馬西來勳可樹河冰北渡驛誰通一壺或負千金重白髮丹心愧少同述懷二首子月中旬以從雨雪交作羣冦合攻大坑荆山小水逆黨出城南三十里立寨二十四日破白水下塘二十五日破吾里吾與次兒長孫寓歷村下牢是日省都事吳軍已到郡二十六日走度嶺者相屬如繩過午猶不得家中消息心甚憂薄晚長兒來乃知念五日四更初冦掩出吾里兒曹隨衆走厚富向晚冦退渡江趨王屯暮抵南阜李氏已空室矣二十六日早中宵蓐食行至高臺嶺巔但見連延朱村大坑冦火千炬雪凍道滑婦人稚子僵仆不能進扶挈度大湖嶺出章坑天已晚長女母子無托與偕來闔門不自意全遂投下牢依陳氏暫住述懷二章冦陷吾鄉今二日連宵列炬似星分如何去此三十里家中消息杳無聞咫尺干戈皆逆境連綿雨雪助妖氛兀坐此身同槁木恍然不復辨朝曛風雪爐存半死灰每聽人語輒驚猜眼穿屢揖親知問愁極忽傳兒子來足繭荒墟烟慘淡魂飛間道石崔嵬經過且勿談辛苦闔室無虞已幸哉默念末路危機逐日新遭逢瞬息異寃親多疑忍事甘存拙久亂全生幸處貧北海牧羝宜反漢東門牽犬竟亡秦古來反覆無前算那得匆匆論世人書所見正月十八夜全參政軍中告變縛致都事哈喇台小鎮撫阿爾斯蘭布哈萬户張定住將戮之十九日昧爽其麾下擁衆扼全舟脅取二人入城閉關縱兵大掠全由此失勢四月二十七日吳員外部將明塔布台潜蓄異志忌同列林巴延烏都梟勇挾詐殺之誣以謀反吳不能制又參政軍令喪馬一匹償白金一百兩是蓄不戰之馬也百金戰馬廄中屯部伍酣歌徹曉昏牙帳黑風梟突起營門白晝虎相吞史徒富躐官曹位厮養威聫士族婚天下紛紛寧有此我軍成敗不須論記憶先親復齊先生詩二首九日初度先父生宋淳祐己酉九月九日厄於陽九畫成乾淳祐遺民自憮然正則庚寅宜有字絳人甲子已忘年菊枝偶地存幽操汗簡何心理舊編賴有童孫初學語挽衣爭果戲階前代李季實賀歷塘劉所立生日春入霞杯喜拂天初逾六六紀瑤編人間銅狄何時鑄天上銀蟾昨夜圓六月十六日生秋水精神高六月仙人風骨妙千年山林城市遙相祝凝望蓬萊隔紫烟石初集卷四

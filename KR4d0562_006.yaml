body:
  text: 石初集卷六元周霆震撰序吉水州新城序送都事諤卜都拉兵興連年生靈塗炭日甚相國陳公之定江西也専以愛民為心便民之政靡不修舉故公治洪而洪城增徙九江而九江之城建凡以為民也樞密熊公以相國腹心之寄分治五郡城池之益廣與崇方事不煩而民益附吉水屬邑水陸來往之衝民無以為固樞密按圖度地曰吾職也都事吳某其往城之經始季秋畢以良月春秋傳火見致用水正而栽之義蓋吻合焉髙卑厚薄溝洫土方逺邇事期徒庸財用各適其宜開一郡之壯觀於下流隱然方城漢水之勢於是邑之埀髫戴白脫乎鋒鏑之懼投諸袵席之安都事之心樞密之心也樞密之心相國之心也傳曰以佚道使民雖勞不怨以生道殺民雖死不怨殺者都事是役充其惻怛慈惠由樞密以達于相國同一愛民之心佚道也生道也其可忘耶按樞密之鎮是邦視民如子都事實左右之其律已亷介論建不阿遇事明決數從征伐出竒訃活人死地所至有聲吉水版築之餘一新州治興學校復流徙宿弊盡蠲皆深識大體郡邑賢者美其事屬豫序之豫索居日久何能重輕然樂道人之善遂執筆不辭送劉𢎞略逺逰序余昔未壯時見士之懷才抱藝有志四方白首而未遂者往往悲歌慷慨悵然負其平生不勝往日之悔故凡後進之彥邂逅相遇必勉之以不可不出出之不可後時又必申其平生悔恨之意而願望之若已事之不可緩間亦為余上下極論余方盛氣自許以為宇宙分內何事不可為在所建立耳何至是耶回首三十年風霜百態心事落落老已先之雖伏櫪千里此志尚存而聞雞起舞之狂不為世故消磨者無幾矣夫然後知其人之志為可感也余友劉𢎞略淵源家學有志盛年疏通不羣竒氣橫出所至無不欣慕願交一日别余逺役將極泰山黃河之髙深以發舒胸中所藴余聞而壯之於是取昔之人有志未遂而以告余者與余之不能自拔低徊以至於今者反覆陳之以為𢎞略助𢎞略其勉之矣吾鄉固多出者而鮮以儒術聞訃其足迹所經殆將遍天下至于山川形勝人物氣概古今壯觀名賢志士之所從出則茫然孰何豈為不暇問就使能問亦不及知徒追逐妄走而已果若此復何以出為哉吾固謂出者之未必賢賢者之不能出使人每致恨於事會之難齊也今𢎞略挾儒術以往周流博覽登髙能賦鄒魯之絃歌揖遜燕趙之慕義強仁舉足以充其耳目無歎老嗟衰之意有青雲自致之資將之以慎密達之以優柔豈無傾蓋而指廩者乎豈無别東家而西家待贐者乎又豈無握手出肺肝相視恨相見之晚者乎固不待決之蓍龜而遇可必也雖然吾所願於𢎞略者猶有説焉詩不云乎維桑與梓必恭敬止古人事親愛日逰必有方良有以也以子之才得天下之士而友之顧盼間乘堅驅良如持左契相符不翅過尚毋曰何所獨無芳草其必有方之義愛日之誠為心是則逰之善者而吾所為深致意也𢎞略念之美永豐縣尉周誠甫詩序往年羣盜縱橫馬將軍持郡檄領兵吾里控制安成永新之衝時則周君誠甫以佐州長收復城池功擢巡檢實左右之幕府初開冦鋒再折士各懷才自負誠甫妙年善騎射膽氣過人潛身衆中未嘗與行伍較優劣一日戰汶西石門冦酋挺刃突出引弓仆之轉而前仆者奮起擊馬後回轡斬首躍馬復進手斃十餘人追奔數里冦披靡不能支比還甲裳皆赤馬公曰壯哉良將也自是每出必俱賊望旗引避事聞監郡辟永豐尉後值馬公他出誠甫留南從容矢石間恆以少擊衆幾死者數終不少貶其初雖餘孽未殱然相戒不敢輕犯自癸已夏迄乙未冬吾里閭閻畎畝父母兄弟妻子得相保者皆馬公所賜而誠甫之用力尤多余初未識誠甫意所交燕趙豪俠酒酣呼鷹射鴈叱吒風生視吾輩土苴爾送客吳子剛門外一揖得之開口談詩粹然退讓君子也然後知向之慷慨激烈出萬死不顧一生皆理義所發夫惟有得於理義故知綱常大義不可渝彼嗜利偷生者不可同年而語明矣諸賢相與歌詠其美俾豫序之若誠甫從事之勤自當見知於上余賤且老何足以盡誠甫哉雖然觀風者必有取焉或足為方來勸遂執筆不辭張梅間詩序余昔以詩文謁桂隱劉先生時張君梅間出其門年甚少已工吟詠尤善行草書意氣相期若古燕趙悲歌慷慨何事不可為喪亂重逢劉先生沒已久余與張君亦俱老矣獨吟思未落展卷求評余何足以知君余僅守故步何足以知君然有感焉近時談者尚異粳粃前聞或冠以虞邵菴之序而名唐音有所謂始音正音遺響者孟郊賈島姚合李賀諸家悉在所黜或托范德機之名選少陵集止取三百十一篇以求合於夫子刪詩之數一唱羣和梓本散行賢不肖靡然師宗以為聖人復起殆不可易余何人也而敢與之言哉因君善鳴觸我浩歎夫詩樂也發於情也情之類有七隨其所發而形於言故感人易入而入人深曷嘗布置先後若律令條格秩然不可易哉考之三百篇是矣今之談者往往承訛踵謬轉相迷惑沒溺而不自知吁其可駭也夫其亦重可悲也夫君之作出入諸名家浩蕩如潮磊落如星如車馬風帆翕忽變化時或抑揚反覆又若山陽之笛倚風獨奏聞者自不能為懷而一以平易出之瀏瀏乎其有遺音佳處雖古人不讓由其情性超越識趣開朗故屹立衆楚不變其夙心余交君數十年涉難幸無恙君思致不倦益工余愧君多矣獨恨不得復起劉先生取正以袪前所陳者之惑而使後人聞之君之作異日必傳固不待余評也贈曾億韶州省父序豫友彭貫思少負磊落倜儻之資往來公卿貴人如布衣交持耿耿逰四方所至恆必有合頃嵗客嶺海遭亂淹留妻子甘貧故廬道逺消息絶相傳或異浮沉竟莫知去嵗之春其鄉變起肘腋家殱焉長子曾億適婦氏幸脫煢然不顧萬死奮起復讐雖未盡如意然聞者莫不壯之貫思去時曾億年才十二今二十有五齡矣間關變故志趣益堅會音書韶南來父蹈危機無恙急附舟西上謁焉行有日别余求贈言余感其父子懸隔千里曠嵗時涉難不死相見且有日蘊蓄憤惋以俟宇內之清天於善人未必無意也山川悠逺舉足荆榛慎無以千鈞一髮之身行殆道曲江公邑里再拜披心孝子與忠臣類也其必有以相子彭氏未艾之福將由此卜之邑掾劉以輔亷能序自兩漢盛時列郡多良二千石然必資賢掾以左右之張敞以掾不按事而致之法吳祐謂觀過知仁其已然之迹今皆可見蓋守令治郡縣凡事總其大綱至於斟酌進退别淑慝決嫌疑絶壅蔽使閭里無歎息愁恨之聲椽之所係為尤重任是職者夫豈易哉數十年來貪冒相承其痛有不忍言者新朝更化守令之選得人居多掾吏互遷宿弊斯革東平劉君以輔因父吏瑞金家焉掾于贑素以亷能著聲稱於是由贑調廬陵廬陵劇縣也臨以大府治當驛途簿書期會日不暇給達官貴人之迎送相接於風雨寒暑而不敢告勞懷姦挾詐之徒又相與投間抵隙以攻其短前後至者鮮不病焉以輔精白一心勤勞朝夕縣令又賢而明聲應氣求雍容一堂之上事至立決如燭照數計造庭纍千百無留遊創恢恢乎恆有餘地縣豈真難治哉乏亷能爾余嘗即耳目睹記守令之稱職者往往有之察諸掾曹某也厚其資某也巧於進某也以事去某也不能芘賴其後人欲求剛直奉公不撓不變如劉君以輔之為甚不多見也以輔勉乎哉恤凋瘵之餘推惻隱之實行見農桑被野雞犬相聞禮樂教化興起於安居樂業之中孰非君之賜由縣而州由州而府而省憲青紫拾芥列位縉紳其進未可量也又豈廬陵止哉吾固願見在庭有同志者幸以是告之劉能翁入蜀省父序蜀於天下為至險凡山川風氣水陸所經固不待身親其間槩可識矣然地大物衆百貨所都四方咸走集焉近年逰宦往來無不得意大率視如康莊吾安成柘溪往者特盛往而挾所長公卿間買田築室若將老焉則清叔其最於是二十有八年矣方清叔往逰時能翁甫九嵗出入起居母訓是式年十六即慨然念父不憚數千里致其迎養之誠諸公貴人之愛清叔者方膠固莫解俾其母子俱來能翁歸母不可往溫凊之恭兩不容釋乃間嵗一造父所期以必歸俯仰二十年視其志如一日今年春豫來溪上始識能翁聽其言不覺前席又聞旦夕再往求一言自朂庶幾慰恱其親昔天長朱夀昌七年知念母求之五十年上下四方流離險阻同州之遇夀昌亦已老矣能翁年富志確人事盡而天理自見將見綵服回車父前子後指某丘某水之逰釣道故舊而歎樂親戚在焉墳墓在焉夫妻子母之屬父祖子孫之慶雍穆一堂鄉人歎息而言曰是母之賢也始終一節及其子之有成是子之孝也數千里往復頻年竟得以遂其志是父之慈也不必久客思故鄉於異日而悠然江山吾土之懷此風俗之勵也不知夀昌當日母子之歡還及此否蜀士大夫多賢者試以余言質之其亦有不待言而勉清叔以歸者乎詩云維桑與梓必恭敬止靡瞻匪父靡依匪母能翁有焉邑之士凡久於蜀者其亦為豫誦太白之語針之曰錦城雖樂不如還家劉遂志詩序詩自虞廷賡歌以至風雅頌皆本性情故其為言易知而感人易入興觀羣怨蓋有不期然而然者漢世去古未逺若東都賦後五篇及蘇李相贈答與夫十九首之作往往平易近情義味淵永讀之者悠然有契於心魏晉以降變而辭遊氣卑而聲促唐初始革其敝至開元而極盛李杜外又各自成家宋世雖不及唐然半山東坡諸大篇蒼古慷慨激發頓挫抑揚直與太白少陵相上下後來作者其能仿佛之邪近年風氣益漓士習好異妄庸輩剽聞先進一二語遂謂宋詩舉不足觀棄去之惟恐不逺専務直致傲然自列於唐人後生小子爭慕效之相率以歸於淺陋詩之道固若是乎哉友人劉遂志自幼嗜吟頗不為流俗所變往年同客城西雅相好不幸死亂兵間其季子孚從余逰一日出所編遺稿余欣然讀之愛其情事真切音節諧婉如行雲流水無纎芥凝滯時出警語他人苦思所不能得意處尤在七言長句旁搜逺取浩乎沛然胸中之耿耿將盡吐而雜陳之不少厭彼溺志他岐肆為誇誕者又孰得而涯涘哉因念平生交逰亂來零落殆盡故家文獻求千百之一二於其子若孫茫然不知所對或因以見踈而反獲戾焉世道之可感如此若遂志可謂有子矣惜卷中盡載酬答自著者罕有聞為可恨耳孚之兄升好學警敏凜乎乃父之作之散亡勉旃詩之傳其在此也送李仲𢎞再往西安序李氏子仲𢎞昔從余學性警敏少所屈下卓犖不可羈兵興以來慨然出身行陳族賴以完海內平督府調發從主帥濮公鎮西安當西上未趣裝時鄉人少忿爭事達於府去後獄詞連延府檄徴就辨事畢復西親友之能文辭者集歌詩以贈匆匆來别求敘卷端余交其祖子孫凡四世閭里干戈之後半為丘墟是宗屹立其間如龍驤泛海雲濤出沒竟抵安流如駿馬決踶按轡羊腸九折徐就康莊仲𢎞一再西行壯嵗盛氣無漁陽摻撾之歎有新豐呼酒之豪回視故鄉前人之澤逺矣勉旃此去毋易視同列或起禍端毋忽老成之言恐貽後悔毋惑邪佞而侵以驕奢毋為權勢所臨而失其所守小心事上御下以恩鞍馬弓刀固屬分內暇稍親簡䇿足以開發其聰明應接無失親年喜懼子能受書間嵗一到家鄉以慰答乃翁扶持嗣續不墜家聲丈夫不必局促效轅下駒故應爾也關中多漢唐碑刻搜求一二寄我乃見不忘嵗在著雍敦牂孟春之月石初周霆震書晏彥文詩序晏氏子彥文幼頴悟有志世味泊如稍長即留意筆墨間出遇里巷兒童每羞與伍通家多一時知名士侍立忘疲余留城西乃翁梅間遣其來學與之講析經義欣然會心觸類而通時有啓人意者於詩尤感發故酷嗜吟闕余亦器之朂其勉力勿怠庶進境以底于成癸卯春顛沛風塵東西奔竄漫不知存否何如乙巳余客橫溪來拜館下意此道必廢試叩之猶前日之彥文也出所作袖中亹亹焉律詩首尾舂容規制平妥選體跋涉上下有情七言古句收攬鋪張浩蕩不乏巳極可愛但律詩意次沈著馴習尚多激昂處絶少選體當令語近意逺涵泳優遊自然有得長篇氣骨不可少中間轉換要須突兀起伏變化前後照應使有歸宿方是本色只滔滔寫去多亦奚為大扺古人之作雖若甚平然托興微婉反覆求之方見其不可及若曰辭而已矣豈足言詩從逰諸生自信莫若吾子乃翁四十年知已吾子慎思之吾所望於方來未止此石初集卷六

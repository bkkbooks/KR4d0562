body:
  text: 石初集卷十元周霆震撰題跋閲晏彥文所論王生江南野史郡人有王炎登者濫名忝宋季士流鬻爵登仕著江南野史不録文丞相以吕文煥賣降為不得已晏彥文按春秋追論之雖難掩廬陵之愧愈於知而不言余平生寡合自信朴愚每閲陳夀魏志及王介甫讀史詩未嘗不反覆嗟歎掩卷流涕蓋古今興廢之際談者惟務趨時諱稱先代故忠臣義士多泯沒不傳而姦巧橫行子孫根固數世之後豈復有公論哉殊不知經史昭日月成湯慚德仲虺終不敢以為無夷齊餓於首陽仲尼表而出之為萬世勸雖春秋亂賊接跡戰國七雄並爭然而天理流行未嘗止息秦漢而降如魯仲連當世利紛紜之㑹寧甘死蹈東海義不帝秦管幼安避難遼東三十年終老魏都心存漢室百世之下聞者莫不興起此豈有使之者哉抑又有大於此者漢興規模宏逺矣蕭何治未央宫壯麗宜也而髙祖怒曰天下洶洶未知何定唐建成元吉之死人倫大變前所未有史臣曲意掩護而大宗命直書之范質循規矩惜名器宋初賢相也而缺周世宗一死公義斷自太宗此皆創業埀統之君極人情所不敢言而慨然出諸口卓為異代信史曷嘗有所避忌哉江南自革命以來學校碑刻悉刋去宋年號朝廷初不知其所為仁宗在東宫一日問左右文丞相何如對者皆貶其不知天命仁宗作色曰如卿所言則馮道却不是忠臣矣衆恧屛氣相視惕然信公日見表彰揚於內外臨御之日語廷臣曰儒者握綱常如拳蓋為信公而發由是復興科舉一代禮樂蔚然有光天理之在人心千萬世如一日詎不信乎凡具耳目者曷不於此觀之鄙夫盜竊儒名不啻犬彘誠如許昌靳裁之所言使其人存不與同中國况得以汚君子齒舌哉附録蕭彛翁碑隂吾不識盧景宣其先山東人隨父來南父殁于官貧甚事母以孝聞一日於友生晏彥文家閲夏道存所撰蕭彛翁墓志彥文從旁歎曰厚哉盧景宣微斯人彛翁不傳矣昔受學於彛翁參政全子仁討紅巾時辟彛翁行軍參謀全貪暴自用彛翁具員耳戊戌城陷全奔贑彛翁義不辱約録事張元祚同死張降彛翁一再赴學宫井死葬讀書臺下逼近城墻閲十有五載發卒修城景宣客鎮守軍帥歐氏大懼浸沒請于歐令卒伍物色訪求得之草莽間棺衣悉化白骨儼然捐嵗俸白金若干改葬如禮夏先生為文以傳不朽厚哉景宣之為人也嗚呼師道之不行久矣始學涵育薰陶若嬰兒之望長稍識趨向即視其師如路人欺其交遊侮厥父母或僣臯比之席或彎射羿之弓固不待死而背之也彛翁死義無後倉卒旅殯陵谷改移景宣追悼久而益堅見諸行事難矣哉近世有避兵走死赤日黃塵瘞道側同行者歸告其子事定令偕往收殯子邈然置之弗問又有逃竄將出境候者失期顛踣而返自度不能活一夕陷首空池淤泥中俯伏死槁尸池邊其子客居曠嵗嬉笑自如彼二人者既不能免父於難距死所可百里委棄泯滅未嘗一動其心較之景宣師友間何啻霄壤吾固繫此於彛翁後匪徒著景宣之賢因以警天下為人子者彭九萬妻死冦本末至正壬辰紅巾冦禾川省掾陳允中率官民堅守辟九萬行軍鎮撫晝夜勤勞冦方竸時九萬馳馬白上官嚴設方略其配李氏促具食勞軍士氣倍增戰大捷冦退居民安堵婦人倉卒出此亦大竒哉明年十月湖北五溪苗獠詭辭助順突入城焚廬舍掠民財倉皇奔竄死者相藉李氏及其子友諒女秀瑛俱被執驅之行不從脅以白刃不動問所求罵曰狗彘吾死吾節斯已矣何求遂母子皆遇害因憶歸附後禾川變起丁丑屠城相傳有趙氏婦抱嬰兒匿州學禮殿北兵搜得彊汚之不可死于禮殿之南事定母嬰兒血糢糊影留殿階不滅剗去復存學官述以文立石為後來勸嗟夫節義者人之所敬也彼趙氏得於傳聞士猶稱述懼其泯况李氏名家始戰勝却賊有佐助功卒守節母子同死視趙氏殆將過之夫賢又能歸骨于封鄉之南臺山本末可徵如傳其又可泯邪千載之下猶使人追慕而起敬也余既髙李氏之義又重惜九萬厄於天而至此極故為辭以哀之其辭亡贊番陽潘母胡氏贊并序胡氏儒家子天性純至配番陽潘希古事舅姑以孝聞至順辛未大疫希古病且殆胡氏默念曰在室惟三兒長才九嵗次七嵗次四嵗無內外懿親夫萬一不幸兒將何屬乃涕泣毁容自誓焚香祝天曰潘氏興廢係夫存亡若命數在天不可逃願以妾代夫身庶幾宗緒不墜妾雖死實甘心焉禱訖希古遂蘇胡氏後五日死希古日夕哀念恆恐幽冥有負凜凜焉長育諸子至於成立官學校以夀終其適長景嶽為安成邑佐撫掌兵燹之後民賴以生家甚貧篤志有守金玉貨財凡可欲之物填委輻輳一毫不以經心縉紳接迹誅夷獨超然刀鋸斧鉞之外古所謂剛者殆近之矣非此母不生此子故并及之贊曰夫妻子母之屬人倫至重喪夫而自誓守義史傳往往有之未聞籲天以代夫死而憂深思逺在於後嗣者當其倉卒捐生慨然引决既婦道之所難而憂及後人知有夫而不知有已尤母道之罕見婦道也母道也俱有以異於人一念之烈自天祐之克昌厥後而其子之樹立皆人所難此天道之自然也向使夫存而子莫能訓子壯而無以顯其親則天道為不可知矣感應之理彌久而益著天定可必豈不信乎碧溪贊并序廬陵多佳山水都其勝者曰橫溪距郡密邇歐陽文忠之先宰樹在焉小溪環流映帶如練友人蕭貴卿居之取碧溪自况其季子恆從余遊請究其義余嘗升髙四望涉溪之源休於江滸慨昔賢之不作居是間者豈偶然者將核斯名於稱情固當引而伸之也贊曰水生天一萬有之初瀦為池沼匪為江湖山下出泉放乎四海望洋無垠其淵有漼泉之始達演而溪流盈科而進有本不休夏潦春霖奔湍駭浪左决右衝固難具狀殆其定也表裏湛然源流一碧玉潔冰堅泥沙潜藏潢潦逺去碧者其天性真呈露智人於此適興陶情爰漱我齒爰濯我纓清風在懷載色載笑明月無心放歌埀釣漉溪而釀秋桂始花汲溪以石石鼎春茶弗激弗揚斯澄斯瑩水云乎哉我天其性逍遙容與或淺或深中心默契朝夕洗心持之以平視溪猶鏡隨流應之周流涵泳存之於淡溪靜匪愚滌除垢濁漸漬紆餘什伍閭閻傍沾沛澤以溉釡鬵以豐稼穯越若子職譬之派分伯也幹蠱季也崇文施於諸孫沐浴其滸夢寐吾伊青燈夜午遡泉達海其不在兹樂夫天者益廣其施峩峩文忠榮顯此始紹述髙風尚其敬止歐陽氏畫舫圖贊掬指之舟恆昧夫先備千金之壺每捐於既濟此古人所以傾覆相繼圖畫舫者誰歟驚風濤於平地斯人也深謀逺慮居安思危凜乎臨淵而欲墜夫然後免禍於干戈之際宜其坐觀冒利涉險深得歐陽子之微而沐浴膏澤歌詠勤苦默契太史公之遺意猗歟休哉弗畏入畏周尚易出軍圖贊執弓矢者其容舒鞚鞍馬者安以徐指揮左右而坐自如不知者將以為輕羊腸九折之險知之者則見其胸中兵甲之有餘遡而求之非有得於漢廷傅介子之意氣能若是歟張梅間寫真贊丰神灑然談辨鏘然鍾王筆法姚賈吟編昔也諸侯之賓客今焉偶地以周旋不知者將槩以脂韋之類知之者則見其玩世而神全噫此之謂杜德機殆自適其天者乎琴隱寫真贊潜心自逺其神全寓物恆平其智先飄飄乎一琴一鶴殆無入而不自得焉自贊承平少壯竟絶迹於鳴珂遲暮艱危屢脫命於干戈端已而不矜重交而不阿長貧孤立適興詠歌生平無害物之意恆簡靜而謙和方寸間其或得於天者稍多祭文黃尚書幕府伍經歷祭旗文國家用兵五年四方次第平余從尚書奉詔出都門天戈所加無不定順狡焉小醜敢抗大邦皇威顯臨其黨之毒于永新者既不逺二百里而送死安成伊邇何恃而猶陸梁方今秋令司刑金為兵氣諸軍順時進討其成厥勳嘉謀僉同穆卜允協大旗卓建所以明號令肅觀瞻揭日月而光華之祀事孔嚴重王命也皇天后土洞鑒丹心惟神其歆相我必濟石初集卷十

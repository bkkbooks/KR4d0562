body:
  text: 石初集巻五元周霆震撰五言絶句擬復愁十二首一燼城門火餘灰已復寒小兒爭炙手猶作燎原看殺氣頻年盛南昌接武昌帝城春有路昨夜夢錢塘錢塘江上水幾載獨朝宗到海傳消息殷勤起臥龍旌斾簇雕鞍花袍紫鳳團路人潜側目敢謂沐猴冠來往動成羣翩翩得意人九朝深雨露頭白獨沾巾天驥鹽中蹶瑤釵井底深如何起阡陌坐致萬黃金銀鞍寳校新羅綺耀青春曾識官儀舊羞看馬上人屏迹譙樓下深追少壯時臥聽更漏鼔雙淚落如絲朱衣羣百恠白晝出乘車咫尺青門路無由得種瓜列位公侯寵連營使相尊庶僚供指使誰復恥心存徙封餘赤螘逐氣布青蠅欲市金臺駿黃河久不冰未忍歌鴝鵒猶能拜杜鵑暮年心寸許何日覩青天七言絶句賛少陵騎驢巫山雲暗失歸樵劒閣春深雪未消淚墮中原天萬里蹇驢獨過浣花橋戱筆西園蹴踘醉蒲萄北里琵琶紫錦絛堪笑東家頭白者一燈深夜讀離騷客有賦大軍來者戱答龎睂炙背短牆隈問我何時笑口開幾度傳聞狂欲舞如今懶説大軍來夢寐漁陽右北平彎弓走馬氣慿陵不知近日燕山雪添得黃河幾尺深北山口號蘄黃連結蔡州城風靡江東莫敢膺千里南來今送死天知忠節在廬陵過江雲起劒鋒馳捕取紅巾血作池後日廬陵收野史水東第一賽男兒城門書開車馬喧人行呵道競摩肩軍興那得廷如水監郡從來不愛錢莫道逝川波自平莫道鳬鷖元不驚白髮營門二千石幾囘霜月送鞭聲天獄東囘納贑川山峰㫁處是青天螺湖橋下清流水留向槎灘送戰船林郭揚旗激箭鋒江城吹角氣如虹義山雲霧西昌月一片丹心兩地同江西省掾陳允中避罪來永新固守城池屹立羣盜中泰和宣差以廉明著稱境内晏然蜃氣樓臺轉眼空荒墟誰與弔秋蟲道邊小屋柴門掩猶是當年種菜翁紀事去年閏三月十六日歐賊自袁來陷吾州十九日以陳冦敗走郡城急報馳去里猾易桂芳暨脫罪小吏顧清逺兩家兄弟獻馬納降力陳括貨之計追至東門外懇留遣趙普𤣥者復囘遂稔安成之禍四月二日城復趙誅易顧殲焉萬斛北鹽扄海隅邇來商販競南趨去年今日城中價一貫文纔十四銖幸及西成早築場歲寒猶恐菜畦荒山村肉價何須問近日雞豚倍北羊常年北羊二貫一斤今豬雞四貫一斤燼餘十室九摧殘折取充薪寸寸亁隣境貴收紓乏絶遺甿竊負活飢寒鷄豚寥落傍柴荆粳稻初黃菜甲青臥聽兒童傳好語夜來驛使到長亭大洲江水綠如苔畫角吹寒聽莫哀白茅岡頭黃葉落鷓鴣洞口鴻鴈來上已舊俗蠶占擬萬霜兒童猶自賞晴光亂來錦繡無藏處那有心情到采桑感古因讀春秋傳戎事不邇女器有感呉楚之亡後之人以武畧自負者可不鑒哉呉宮隊長罷論兵越女西施擅寵榮百錬一朝成繞指方知世上有傾城鉅鹿諸侯偉戰功咸陽宮殿轉頭空如何葢世稱無敵也為虞兮泣帳中論交古來難覓是知心曠世襟期感慨深造次陳餘方解印從容楊震却懷金坐看亂後交遊隔世心衰年為客怕登臨東風不作年時夢坐看樓頭衆綠深故人春雨初晴是綠陰故人隔水晚相尋往來莫信年時路近日溪流淺處深食性宿舂寧復問精粗食性年來已盡除隨分晚炊誠當肉且乘新雨理園蔬過太平橋秋山戌火夜鳴梟玉帳春酲富貴驕獨抱韋編無寸䇿白頭羞見太平橋山家夜雨晚暮攜孫此一枝四年多難秖心知夢囘小屋風和雨却似春灘轉柁時冦至二十七日冦至三舍盡晚攜孫走下派止姪壻劉務本家二十八日冦出歴村岡頭家眷繼至下派二十九日早下派大驚擾走安塘重疊青山道路長疎疎紅葉樹經霜日斜又度橫橋去秖有江聲似故鄉城西放歌周冦萬四千人發永新水陸並下八月二十九日張錄事出軍九月一日府委官教授滕詣西昌㕘政所請師徵諸将赴援錄事無馬戰不利是夜急報三至黎明馳檄促援兵食時冦焚高沙歛陸錄事軍奔還城内外大駭或爭走入城或赴舟江滸或㪚投村落僵仆死傷不可勝紀賊騎掠太平橋官地上薄晚退屯援兵暮集初三日早合戰自辰至午叅政軍扼上流冦驚敗走衣裝器仗填野沿途民義邀擊禽獲頗多周冦奔還永新當是時郡城幾殆天也國家之福也歌竹枝以寫之太平橋外吹血腥追奔黃􅀈蹶門丁黃􅀈全㕘政所招郡人門丁張錄事所起在城民户昨日縱橫官地上豈知惡極有天刑千金墮地不暇顧妻孥咫尺愁相抛此時爭門城内去悔不雲山深結茅理問軍中騎射精從來賞罰最分明疾馳赴援如風雨曉發河山夕到城水寨城闗摠寂然諸軍號令夜分傳火筒清曉三聲發諸将齊驅勇向前歛陸池邊曉樹旗埋寃樹下夕僵屍皇天近日新開眼説與四方殘黨知慘澹秋陰覆血痕參差蘇石倚蟠根古來此是埋寃樹今日還棲戰死魂大洲男兒身姓熊杷頭削鐵刃如風直前竟斬紅旗首步戰須還第一功斬頭纍纍懸馬鞍衆中誰似林伯顏賊陣橫穿來復去三軍大捷唱歌還先鋒破陣古來難好手齊推岳長官除却林奇誰與對交馳兩馬萬人看記得壬辰血亂流血流又到丙申秋兇徒惡黨還知不莫要輕來打吉州莫道孤城鐵作闗雲埋賊陣血朱殷强梁多在蓴村死戰馬纔餘八疋還叅政遣軍快閣下冦來相遇吉塘橋橫陳江上四十騎居民牆屋免焚燒安坐轅門運六韜冦鋒壓境沸如濤收功一戰民安堵始信將軍定䇿高太守當年憲使除軍須供給自紛如白髪蒼頭寧自暇一宵暫向府中居錄事張公老且貧一身闔郡事如雲倉卒開城容萬衆從容行酒壯三軍軍中苦樂謠半臂纏腰㡌巻氊剪裙荷葉腿齊編市西橋外看屠狗笑擲幷刀賭酒錢堆帽紅纓間黒纓粉青宦袴短黃裙酒樓突過行人避近日新充水砦軍旌表門前路幾彎浮圖坡下日銜山馬上長身單白紵雙雙緩轡打毬還短髪風欺破帽斜日西跣足踏江沙妻孥待哺不遑恤流汗擔柴赴主家疊石支牀擁敗氊抱闗擊柝日隨縁松燈自把芒鞋了要辦明朝買菜錢劒鋒交處奮身跳箭集征袍血未消奪得紅巾衝陣馬歸途乾被長官要官船公子抱琵琶笑指娼船白藕花今夜江頭好風月買魚載酒宿誰家團扇題詩愛越羅畫船載酒沸笙歌何人夜讀張巡傳獨占秋江月色多十里長洲列戰船白頭吟客坐看天何時得見三階正獨倚蓬牕夜不眠初冬驟寒敗璧蕭蕭夜不扉昨來天氣似炎威臥聽風雨中宵嘆何限征人未寄衣即事街頭昨日走如麻逆賊慿陵勢轉加曉起将軍忙館伴省官遣子壻侯家海全二叅政棄舟窮走計全軀全力戰慿城志掃除海身死不殊心死異海全他日付誰書都事諤卜都拉部伍相殘不敢呵林巴延烏都被殺美人雪洞夜酣歌舟中宴居名雪洞到頭誤國均遺臭只為高昌不可和全子仁高昌人其志專在吞呉恐其成功紀實戊戌夏五月之變新郡守張元祚與全府㕘謀蕭彛翁約同死蕭一再赴井死讀書臺下張竟降振文堂上刃縱橫水陸旌旗瞬息更俯伏獻城新太守笑談赴井舊諸生宿州歌客有自中興來者能言四川聞亂遣兵出援主將日寘酒高㑹收其子女玉帛而西宿州南北之咽喉也知州亷能在任十二載逺近歸心因不納拜見之禮責以軍前供給知州既行宿州遂陷羽書兵馬調西川省署新兼上将權不怕連營幾百里冦來只要宿州堅萬騎連雲發蜀都宿州一擲似樗蒲幕僚摺得流星檄牙帳朝酣睡未蘇羣盜河南稔禍端此邦城守古來難知州一紀心如水那得金錢謁上官宿州知州無一錢官差供給赴軍前軍前未到宿州陷從此紅巾勢灼天雲槃長轂輦金繒皓齒青蛾逐日新一夜西風吹漢水將軍歸去錦城春謾成口號余生之歲至元壬辰後立春一日今兹庚子正月十日戌時春與始生日時適合初度春生先我辰餘生時日恰逢春十年風雨江南路猶有先朝白髪人楊栁枝詞偶憶丁酉春客自邑中來誦王大初一絶落句云多情只有城南栁舞盡長條更短條葢指失身而事修飾者戱續之離宮别館短長亭忘却江南舊日春是處人家種楊栁往來繫馬解留人背立東風淺畫睂斷腸烟雨一枝枝隋宮漢苑春無主莫向江南話别離移栽楊栁受風多南畔行人北畔過若道浮萍是飛絮好隨流水到官河舞絮含愁入酒家何因得近瑣牕紗春風萬一無拘束放去錢塘逐落花即景似晴却陰陰復晴曉霜霧雪夜瞻星天機咫尺開黃道借與江南鬼火青惜往日千金愛女貯蘭房百寳雕鞍擁驌驦過眼青春誰是主燕歸無處說興亡穀日薄霧食後晴夢筆生花到枕邊朝來晴穩荷蒼天春秋灾異書將徧準擬今秋大有年去燕吟寄聲多謝捲簾恩花落春陰半掩門只有當時堂上月夜深猶照舊巢痕籬間小花小小閒花分外紅野人籬落自春風江南多少繁華地盡在寒烟蔓草中田家木綿花謝豆莢肥秋風催換白紵衣東家女兒浣紗去西家年少負薪歸題鷹熊聽澗圖奇絶鷹熊聽澗圖眼明畫意近年無子房借筯旋銷印此是人間大丈夫鷹攫熊蹲聽澗聲貴從巧畫寓深情李斯書上秦留客安國謀行漢罷兵鷹熊聽澗古來難飛走藏名戱筆端堪笑陰陵迷失道當年枉怒沐猴冠聽澗鷹熊豈是真畫師托意諷時人白登圍後知劉敬遼水兵前憶魏徵讀天寶雷海清舞馬事有感劒閣迢迢隔兩京衣冠相送范陽城傷心凝碧池頭宴千載無人傳海清太液華清汙禄兒從官千騎競西馳君恩舊日深如海賴有銜盃舞馬知校書馬糞兒童錦繡裾專房倡女后妃輿豈知短褐衡門下一㸃寒燈夜校書漢冠酎金刀布罷長安露冷銅僊屑玉盤畢竟皇天深有意赤睂難改漢衣冠雨中栁塘分路市橋斜海燕雙飛識故家一月閉門聽夜雨隔牆落盡碧桃花劉氏二生從吾兒學赤日中分渠溉枯其意甚善遂成一絶示之渠成不使利專秦救旱分流惠及貧一飯秋來應憶汝艱難相顧幾何人前詩子勤連和七章或病首句秦字難押援筆泛及故事不覺其言之長輸粟常慚晉閉秦艱難稼穡每憐貧溝塍鴈立交通處汗血駢肩荷鍤人井田埋沒自先秦錐卓堪憐白屋貧任氏漫多蒼粟窖王孫一飯更無人雨似沱江不向秦老天應念四郊貧臥聞夜半呼龍起一滴天瓢活幾人世上山中幾晉秦今年却憶去年貧有時彈鋏歌馮劒誰是江東指廪人羸馬孤舟遍楚秦著書憔悴暮年貧茂陵無復談封禪淚墮先朝白髪人黒貂裘弊歎蘇秦短布寧甘甯戚貧摭拾泥塗車轍覆到頭何似漢陰人縱橫無術效儀秦堪嘆先生一劒貧談到薛文焚券事方知豪傑異常人闗法雞鳴幸脫秦何如高臥北牕貧種𤓰一片青門地頭白能來有幾人戰罷長平地入秦邯鄲悄似索居貧定從誰料毛生出羞殺同行十九人五羊皮賤恥干秦自在披裘帶索貧談笑七雄爭戰地乾坤自古有閑人抛却千金不帝秦魯連懷寶豈為貧綱常獨振東周末海内應無第二人山東賓客競投秦枉向商於守賤貧後日子房安漢䇿相逢竟少采芝人不將奇計試强秦一介狂生衣褐貧馬上怱怱談六國何如來就種瓜人黃金散盡務强秦寧計咸陽府藏貧六國暗投離間網奔馳談笑合從人富國强兵善用秦故將子贅抑家貧山東十五年無事盡是偷安醉夢人投筆當年論過秦賈生豈料謫居貧非闗綘灌輕相棄自是才高反累人空自美新更劇秦子雲竟守一區貧草𤣥可惜無良友説與他年蹈海人法立商君始變秦本期盡活世間貧惜無麟趾闗雎意萬古流傳一罪人辛苦兼并百二秦後無蓬顆葬侔貧可憐曲阜東家叟今日猶存守冢人天醉山河却賜秦六奇藏在席門貧古來萬事無能測抵羨商山四老人臨淮百萬蹶堅秦一擲無論儋石貧何似柴桑松菊裏逍遙彭澤退歸人漢中決䇿定三秦本自淮陰寄食貧除却當年蕭相國相逢未許説知人肥瘠何須問越秦紛紛北富與南貧空花過眼無能識輸與嚴灘把釣人杜門公子起謀秦十五商於一旦貧可惜論囚臨渭者扁舟未識五湖人石初集巻五

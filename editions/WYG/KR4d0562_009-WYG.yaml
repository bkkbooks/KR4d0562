body:
  text: 石初集巻九元周霆震撰傳瓦雄傳劉文貫述母雞不尾而孳假雄鳴於瓦作瓦雄謠蕭子貞傳之劉極稱其工石初氏未見子貞所著亦託於戱而肆言焉瓦雄者其先世主西方之辰錫名翰音見小戴禮生而赤幘以善鬭名春秋時仕魯季孟間距金羽介寵遇絶倫歴戰國尤盛函谷闗出客必候商鞅用秦變更法令為私鬭輕重被刑咸陽之雄由是歛跡族寢以㣲牝類徃徃散落涸隂有老嫗思母育恩泣曰翰之類其遂絶乎類絶則鳴丑不聞孰與辨東方之白胥而盲矣牝晨家索雖多亦奚以為夕夢陳寳附耳云七國縱横争戰汝見聞習熟獨不記孟嘗君脫闗决策乎善為鳴者齊客也宇宙間變化神竒孰非假託特未之思區區羽族賤㣲呼吸變化生機頃刻又何患挈壺氏之失職而不三號也哉古有陶瓦之士因瓦為氏播物之巧侔於大鈞自有宫室以來功施棟宇萬民利之動静互根物兩必化盍徃請焉夢之明日嫗物色造門其儔襍處埏埴嫗擇重厚隂陽各一邀與同歸有以周易見者使筮之遇明夷之家人曰吉明夷坤上離下坤土重厚離火炎上厚重為質炎上成功其應陶鈞外卦變而之巽巽風也巽風發揚離明兆合静極生動聲登於天鶉主飛動雄兆也嫗謝筮畢延瓦上坐召牝之所生曲拳以獻隂瓦氏受而載之顧陽瓦覆二人相謂曰此所謂見卵而求時夜者歟獨陽不生獨隂不成我二人共切嫗既已知之矣目嫗取孤竹小挺鳴陽瓦三有若闡桃都之秘啟陳寳宻祝還以受牝置瓦屛處越二旬而鷇果得雄由是繼絶日就蕃滋數世之後不可勝紀二瓦朴陋未始自陳其功混身淤礫中久而冺沒嫗亦漫不復省他族載輿圖者若賢妃之警戒志士之起舞賈小兒之寵劉安之仙無不表表在人耳目獨瓦氏之派寂然無聞於是宋宗後人作而歎曰甚哉秦嫗之善忘少恩而於陳寳之靈為有負也我不可以無言瓦氏代不乏人前史失紀魏臺之銅雀唐殿之鴛鴦進而與王者居餘子輩何足録也今太史氏其為我明之太史曰形化之先原於氣化氣化者隂陽也天地之初隂陽而已亭毒宻運夫何端倪消息盈虚縱横萬變兔胎本於朢月女國孕井而生瓦雄之傳亦若是耳焉用蔓引古昔譸張自欺傳曰隂陽不測之謂神此不測之神也體物而不可遺至矣説彭楚英字說春秋傳稱楚多才召陵之盟屈完奉命而不辱晉國通好以鍾儀樂操土風其後三閭大夫文章名戰國卓然千古足以補國風之遺盖其山川磅礴扶輿清淑之氣鍾而為人故英華發越恒有以表見於世其來尚矣彭氏子傑好脩而文字楚英介余友李君伯玉求言以徵之殆有得於山川之扶輿清淑者歟將折衝論建慕屈完鍾儀之風烈者歟抑㳺心瀟洒洞庭之淵浴蘭沐芳攬蕙􅉅泛秋菊而追屈子者歟是宜慷慨激揚足以有為而取知當世有非拘文委瑣所能及其雅尚可知矣雖然才本於徳士君子立身必以忠信為主記曰和順積中而英華發外夫英華之所以著於外者皆和順之實有以充於中也是以聲聞過情君子恥之惟自脩於内有篤實自得之功則令聞廣譽施於身風采振揚有不期然而然者矣楚英素能愛兄敬長睦行鄉人師友間講之必熟余特懼其發揮太過而於所當務者或未盡耳故以是說終焉亦友朋切磋之義也思永字說古者冠而字所以責成人之禮自前朝馬上治天下冠禮遂廢字亦罕聞遐方諛佞成風率妄引美稱以加愚騃一唱羣和若宦妾焉受之者亦恬然無愧竟不復以字行長傲莫甚於此廬陵横溪蕭氏子昔從余㳺名之曰恒字以思永而未暇以悉其義晚歲重來溪上請有以明之吾年八十有四歲矣其可靳於吾友乎周易下經恒列於首恒久也非一定之謂在於通變不窮洪範五事終之以思思者心之官也自臯陶謨訓蔽以永之一言其㫖㣲矣惟能知恒非一定隨事變通然後足以明此心之官而心思以至於永凡人日用動静莫不有思乃其常也然不過循乎逺近之暫爾若夫心思而至於永則非知道之君子不能盖心之神明以方寸之㣲而攝三才之蘊俄頃之知而通千載之前曰思而已周公之坐以待旦孔子之終日不食終夜不寢皆所以永其思也况學者乎他岐眩惑得以汨吾之思非永也中道嫌疑足以病吾之思非永也安居省察當造次而忽亡非永也平日操持或頃刻之少怠非永也夫所謂永者心意循循相為悠久非勉彊於一事一時之所能也是故事親則思永其孝事君則思永其忠交朋友則思永其信物欲牽引易於變移則思有以絶之憂患侵陵或至沮喪必思有以勝之理義之奥則日潜其思於未融心術之㣲則日察其思於未遂事物之來有限吾身之應無窮思貴有恒惟恒故永非恒不能以致永非永不足以言恒合易書之義不忘三復於操存終身由之無入而不自得矣思永生質信厚不剛不柔試用於時所至稱善庶幾有味余言交㳺或以虚美相加佞人也逺之毋貽識者之笑題跋書章立賢傳後余讀史記至田横海島五百人皆死竊疑太史公感時憂憤彰大其事為天下後世勸未必其盡然也及觀我朝淮南余叅政死安慶盡室相從如歸闔郡無一人生降然後知前史之不誣而天理之在人心千萬世猶一日也復有奮身草野臨難相從父子婦姑義不辱如龍泉章立賢益可驗斯人秉彛好徳之心而史氏之言為尤信立賢儒者也布衣也非有千金之資一命之貴起衆仇致盗憎姑引卻退藏以脫須臾何不可者而毅然父子萬牛莫回嗟乎難矣至於深閨荏弱亦慷慨激烈如金石曾不少變何哉盖其浩然之氣養之有素自脩身以及齊家非一朝一夕之故也使立賢生戰國固當不遜田横擅一郡守之必不在余安慶後又進而得行其志於天下則人皆心立賢之心與海島安慶相倣傚矣豈憂盗哉於是海内干戈且十年縉紳間徃徃不能引决望風屈伏憂辱以䧟於死亡子弟妻妾忍言事讐不啻犬彘盖家庭教詔惟知持禄固位君臣大義未嘗一語及之則臨難决死生之際子焉而不父其父妻焉而不夫其夫所由來者逺矣其或脫命鋒鏑貴妻愛女一旦夷於倡優反因之以邀寵利焉此又禽獸所弗為者原其絶滅天理玩冦以資富貴日肆漁取之心未必不自以為得孰謂妻子之不保展轉汚辱至此極哉未知其心亦有悔乎否也惜無以立賢之事告之喪亂以來求立賢本末於友朋執筆而無愧者鮮矣獨子髙劉楚慨然為之傳余讀而異之悲夫自余淮南而下落落不數人禮義亷恥大率冺没於公卿大夫而抗節不出者恒出乎一介之士於此尤見舉世䧟溺之餘天理之不可泯者自有時而發見也惜其不盡傳傳亦未必信如蕭彛翁之赴井雖其初不能直道事人然就義從容亦足盖其平生矣談者猶以無官守之責非之是亂臣賊子之黨惡足與論士哉因附見焉庶來者之有聞也書劉敬方所藏其兄元方遺墨後冬十二月到郡始得與夏道存相見談及劉敬方道存拊髀曰惜哉其兄元方昔兄弟受學於先叔父華逺師死而未卒業仲善兄官會稽日復負篋徃從其後兄弟自相師友之日為多元方已矣敬方今無恙乎吾笑曰飲尚可數十杯横經授徒聘幣交至迹不能出門坐客相視嗟歎久之歸途過敬方留宿燈下出實軒詩一章片紙楷書泫然曰亡兄遺墨也寒門薄祐先父年不滿三十吾兄㓜孤植余遺腹力學甘貧幸不墜儒業壬辰兄没天下大亂間闗萬狀提挈二侄一子涉難茍存前年又喪次侄遺孤藐然余又埀老毎覽此紙悲不自勝令其子孰信朗吟客憑几聴音節起伏開合抑揚詩家律度具足仲善之序蕭氏一徳求已二進士之題字相與發揮歴歴可考嗟乎揚子雲為西漢儒宗而太𤣥之作當時巳譏其覆瓿韓昌黎文振八代而金根車之義其子竟莫能通蘇内翰賦詠聨篇而詩禍之興家人棄之恐後其他埋没何限敬方獨存此紙於干戈二十年之餘寳而藏之不啻千金之璧其可尚也夫天夀斯文綿延如線係於一人之身㣲敬方是宗殆矣豈復有一言半辭留傳翰墨使人深嗟不能自已而俟來者之知乎吾是以反覆沈潜深有感於此片紙也兄弟之愛鍾焉師友之傳著焉子孫之慶賴焉一事之㣲三善交集其於倫誼固不愈厚耶劉氏未艾之福不必他求即此乎在矣後復從敦信得其和道存别賦及坪下廟捨田碑鋪張舂容紀載詳贍有古作者之風又諸君子所未見故備之庶廣其傳於他日元方雖死猶未死也歲在𤣥黓困敦臘月望後五日石初周霆震書題王伯康遺墨後故友王伯康三十年前宦逰湖北兵戈隔阻消息不聞或言死國沅靖間竟莫知定處一日其子可通持所寄鄒孔厚詩三章泣曰先父手澤也兒生晚不能記憶父聲容鄉之先達云汝父平生嗜吟流輩推慕亂來不存一字寤寢深痛多方購求近得之孔厚子徳誠捧讀如父復生提携懷抱一字一淚幸托世契願賜一言嗟乎海内鼎沸以來倫誼之斁久矣世家子弟流離顛沛之餘辱於皂𨽻降而樵牧徃徃有之其僥倖弗墜者不過馳騁弋獵日逐聲色貨利問以先世茫然不知所對反肆詆欺恬無愧色況復知所謂文字耶幸哉伯康之有子也伯康自㓜以頴悟聞祖父延明師授之書余由是定交徃來賞其俊異既長克志樹立急義重交著述多樂府歌行宦㳺京師歸而賓客益衆見聞益廣殊足以慰恱其親國難將興檄逺方逰徼治裝戒行親知力勸引卻慨然曰丈夫立身報國政在艱難即日就道後聞冒犯鋒鏑委命于官多所建置惜其事不傳此詩不知作於何所收藏故人之子可通求得之余白頭江南文字間復得相見何其幸歟慨念宇宙寥廓陵谷推移善和之藏凡三易主平泉草石無復子孫凌虛臺之野草荒烟汾陽宅之古槐夕照在承平時且不能自保付哀感於後人干戈糜爛之餘珠璧珍竒漂沈沙礫姬姜玉雪流落風塵愛所不能捐恩所不能割不暇一毫顧戀區區殘篇簡脫之醬瓿煨燼而黼黻文章托友朋以傳其子豈偶然哉父子之親藉是得以繫孝思而不泯朋友之義由是可以禆世教而追古風皆人倫之大者天意殆留為孝子慈孫之勸而片文隻字托於交際乃有以夀斯文一脈而啟他日過庭之訓篇章云乎哉王氏傳家之寳千金未易致也徃年王櫸山購得澗槃遺稿一帙授其子孔厚以歸于鄒氏稿至今存孔厚澗槃仲子也徳誠推其父昔之授於櫸山者今以施之可通櫸山廬陵老儒後進多所汲引談者尚之敬書先親復齋先生律賦後先親平生著述遭亂灰滅此前宋塲屋程式記憶僅存書以示後間或片言隻字殘缺已令同文鳳祥筆之遺訓昔受學於祖鄉石門梅屋尹功甫先生甲子安福賞試明祀世祖緝燕多福賦先生中第一名七韻警聮云大風之㑹何殊赤縣之塞霧棧道之絶不減滹河之度氷盖二祖則同有艱難斯有福力由今日觀之無創造則無中興此師友間意故并録之文體雖世代之不同然學識議論之髙古今一也目昏愈甚執筆惘然後之人以此為心則庶幾矣歳在闕月闕日嗣子霆震敬書書周思忠所著王孝子琛傳後郡前修日逺近年肆為記序傳賛者率不自量肆情妄發遂為四方所輕彥文來山中袖出此傳讀之不􅁴驚喜廬陵豈真無人哉寫至琛年七十以哭母終猶極警䇿昔戰國時齊深井里聶政家貧母老為狗屠旦夕得甘脆以養親濮陽嚴仲子奉黄金百鎰為政母夀求以報韓仇母死服除竟為仲子報仇暴屍韓國同一狗屠也彼以報仇死此以哭母終琛雖小人去政逺矣傳賛有悲歌慷慨意宜追古作者宇宙寥廓庶幾此道不孤吾以思忠卜之也代跋友人王誠之示余周思忠所著孝子王琛小傳或謂琛小人屠狗辱處士君子羞稱書之過也余曰不然琛生長田間樵牧椎埋與伍初不知讀書為學而致養其母服喪過哀以終斯可稱純孝子矣書不書固不足為其重輕先儒謂無好人三字非有徳者之言有之而不取其於為人賢不肖何如也大抵今之士君子徃徃喪其良心奔走形勢矯誣媚恱惟利是趨聞王琛之風不泚其顙反譏傳者之非不知所學何事互鄉童子之見夫子與其潔而進之沐浴齋戒之惡人孟子以為可以祀上帝傳琛者獨不得援此意乎遂書以授誠之庶有志於道者知取舍之不可以不審石初集巻九

body:
  text: 石初集巻七元周霆震撰記義兵萬户馬哈瑪爾安塘生祠記國家承平百年東南武備寖弛盜發徐頴扼荆襄上流蘄黄乗勢連結掩吾郡之不備賴守臣盡力城以克復而妖孽所染不可勝誅雖廬井細民涵濡至治之澤不知自愛故兇徒揚煽其説甘心沒溺不辭亦由分兵四出者不能體念牧守意或反為富貴之資重以吏習舞文其弊有不忍言者求如今義兵萬户馬哈瑪爾公致逺撫士恤民盡心報國始終不渝者葢不多見也按公之先自西域徙京師宦逰四方子孫益盛致逺侍親杭浙以䕃補官勅授廬陵井岡巡檢職在察姦求盜而所至書䇿自隨深有意濓洛之學事上接下一於溫厚和平至綱常大義所闗則正色凜然不可毫髪忤臨危涉險慷慨出萬死如履坦途葢由詩書講貫之餘有以察夫天理民彛而此心之涵養有素也粤自壬辰討賊奉府檄東西馳捕南嶺備烏東招集廬陵安成諸鄉復臨江新喻州治出永新馮橋吉水白茅黄源瀘江江口鏖戰大坑移鎮龍泉西昌前後斬捕首虜上功幕府具存監郡忠憲公尼雅斯拉鼎多其能辟安成判官申省授廬陵監縣權烏登萬户府事五年之間芟夷平定生死肉骨者皆是而廬陵視公如父母受賜獨多感恩之深又未有近羣盜徃來出没而無險可恃如永福之安塘者癸已九月冦自永新踰嶺掠玉山火淡江距安塘十里耳公率衆追擊破走之民賴以安乙未十一月袁冦據安成者驅土人大出掩南里越三舍包歴村下牢蹤火數十里民扶老擕㓜顛踣相藉晝夜雪霜中公按據安塘連戰大捷冦退保城而其黨分據永豐者復熾丙申正月晨壓敖城所過無不殘毁火及羅興塘官軍相顧引却人人自危公星馳赴援提步卒三十人進與賊遇賊躍馬奮㦸抵公胄公斬以徇取其馬而還明日整兵復出生擒偽帥周昇奪馬三疋又明日官軍四集焚其營巢拔良民之䧟賊者慰撫之餘衆遁去安塘無毫髪遺失蕞爾僻地煩公屢犯鋒鏑如枯荄朽質絶望嵗晏一旦而春徳澤之在人心為何如也今其江山登望之羙人物邑居之繁何莫非公所賜於是里之父老相率立祠江滸以繫其思若召南甘棠之詩西都循吏之傳張益州畫像之仿彿其平生衣冠狀貌有不自知其然而然者雖公之徳業聞望不繫祠之有無然人情感慕之誠則必因祠以著而或者猶有慊焉盖公之心無愧於古人公之才豈不如古人而吏議常以資名聲壅於上聞僅省府一二辟除止使得専一郡以究其所蘊詎可量哉予故深歎夫一世之屈伸而重為人才惜第公論時出於山巔水涯足以備太史氏之缺且使朝衣朝冠坐於塗炭者見之其顙或有泚焉則此祠之建於名敎未必無小補也是鄉人士求記本末予不敢終辭且復託於詩他日使車徃來俾歌以為公夀繄皇穹兮子民閔下土兮覆以仁殆先事兮毓才俾乗運兮禦患菑吁嗟我公兮曷為此來公桓桓兮以武射則臧兮有翩其馬碧雲旗兮煥朝日耕市弗遷兮貔貅用律我民匪公兮將疇依飢食渴飲兮寒而衣春山沐雨兮笋蕨以肥秋野日晏兮雞豚忘歸何土兮可樂此獨全兮屹如昨祝公夀康兮位朝端干戈遄戢兮海宇奠安民心孔懷兮奔走祠下嵗嵗兮式歌且舞石門八景記古今山川名物隠顯萬殊表彰於名下勝士者不一二而埋没於樵人牧豎恒千百每讀蘇老泉木假山記未嘗不掩巻悵然汶之石門阡陌平曠泉流分注山色逺近與人煙低昂有武夷盤谷之意中具八景東則桃源春日僧院曉鐘南則馬峯白雲勾嶺瀑布西則宻賽喬松西山雪霽北則隔山樵唱北嶺早梅岡坂連延前後起伏或慱采幽曠或追慕古昔名狀之勝見聞相傳獨所謂馬峯白雲巋乎特起仿彿狄懷英河陽之思里士王子琛冒犯干戈殯𦵏其母凡三遷然後安於此八景之名始彰以予先世交㳺徴記余昔弱冠王先生禮聘俾二孫執經先生宋大學諸生字鼎翁居汶西偏事母以孝聞梅邊則肥遁之號子琛其族孫也安成南來豪右鼎峙王氏財産甲諸族其知名縉紳則以梅邊之孝富盛不與焉梅邊凝峻端方士類取則一語中理雖年少必極口奬稱稍越凖繩雖鄉邦達尊亦面折不假借賓客滿座無或敢輕出言子琛之曾大父斯賢兄弟冠帶侍側承平文物如彦方之廬庾氏城西公府薰而善者凡幾人世改運遷干戈所歴向之華堂甲第落而為墟汶屹立其中賴一二才俊相與扶持依然冠屨之舊於是梅邊孝友餘風漸漬沈涵去他族逺矣子琛又能繼前人之志其示不忘宜矣盖嘗究觀宇内山水佳處皆扶輿清淑之所融結鍾是氣之秀者必以其有人夫然後足以俊發地靈之祕記勝跡而埀無窮峴首之碑無羊叔子則安能使千載墮涙浯溪之石無元次山則歌誦止乎當時渭陽之作記載於國風以康公念母不見上虞之文稱述於魏武以曹娥求父殞身陟岵陟屺所以紀孝子行役瞻望父母之思否則屺爾岵爾參錯丘陵原隰過而覽者誰復動心凱風蓼莪所以致生我劬勞莫慰母心之感否則草木榮華忽焉變滅爰有寒泉昊天㒺極之恨曷自而至哉汶在城南居上㳺而都要會衣冠文士之所走集非梅邊孝行純篤未必名揚四方石門八景之勝閟於昔而顯於今非子琛𦵏母盡誠曷足以紹梅邊而無怍人之善因物而著物之美藉人而傳初不足以大小髙卑異視而孝友一念所以貫金石而不朽也余交王氏之初在賓客中齒最少今行年八十有一廢興存亡之何所弗有復見王先生孝友餘風被及族孫何其幸邪而可感矣故畧叙本末朂其後人若鋪張秘思妍辭發揮八景則屬之能賦諸賢余未暇悉張梅間雲林環堵記老友張梅間辟地潯源結廬雲峯之下翳然水竹居者襍耕一翁逍遙三子環侍玩漁樵之争席狎童稚之牽衣放乎其間意若甚自足者自號雲林環堵徴一言識之余撫案三歎曰今之梅間猶昔之梅間與當其在承平也自少為佳子弟名譽流縉紳間談言折衝遇事慷慨有古燕趙之風一時名公卿皆欲出其門下跋涉廣海與臺憲諸俊頡頏誓將攬轡京華㤗山黄河如指諸掌其暇顧深山野人哉蒹葭霜露之餘而止於此回視初心其不大相逺邪雖然塵生中原干戈二十餘年他日名都要地甲觀華堂羅鍾鼓立曲旃負恃専房逢迎接席廐馬委芻粟僮僕厭膏粱豈知人間世之有來日哉而瞬息之間飄風所遇悉化為墟顛踣東西望斜逕托足以茍須臾且不敢必以彼較此得失何如邪或者又以求田問舍槩言之亦非也惟知道之君子始可與言吾因是深思陟其所造則咫尺雪峯非有桂林梅關山水之竒度其所闢則容膝環堵非有承平甲觀華堂之美問其所居則漁樵童稚相爾汝又非憲府英才倡酧詩酒之樂其迹誠若逺乎初心其趣則遯世髙蹈者自有得於言意之表抑斯趣也常情所未易知而足以使人洞悟今有人焉以環堵而舍於四通八達之衢髙車駟馬固弗視也下至負薪之子賣菜之傭掉臂而過亦嘗有回顧者歟甚則羣童欺無力抱茅入竹者有之矣其不與土苴同腐幾希以雲林而施繡闥雕甍則夜鶴曉猿有所不屑舉相率而避逃山靈有知必將艴然懷怒棄之惟懼弗速而况得以汚其名乎是故惟雲林可以安環堵而都邑之雄富不與焉環堵可以託雲林而臺榭之侈靡不與焉茫洋窮乎兩間寳藏之興肇乎巻石千駟萬鍾弗與易也雲林已乎哉夫然後知寓形兩間邂逅黙契之深趣必俟知道君子而屬之非雲林不足以遂環堵之髙非環堵不足以都雲林之美斯林斯堵秘於昔而闡於今天下之竒遇也一或差池胥失之矣樂哉處此玩出岫無心之詞充嵗寒松栢之守慕耕桑而追五栁焉有不足者乎於是梅間作而謝曰受賜多矣遂為記漁樵别墅記漁樵别墅者劉氏子孟謙奉親燕休之所也日以其父敬心之命屬予記之予謂孟謙奉親人間至樂淸溫甘㫖焉徃而不得盡吾情獨有取於漁樵何也孟謙蹙然變色曰噫此豈其所意乎吾氏自長沙來世居荆溪之上國子博士盤溪逰西山文忠公之門所交多一時卿相信國文公尤敬慕焉詩書福澤芘賴後人逺矣不幸兵厄先廬遺構百一僅存迺集山中數椽扁荆溪樵逸溪之隙宇扁玉溪釣隠合而名之曰漁樵别墅於此奉親讀書一日得以盡其菽水之歡亦平生之志願姑以自釋云爾甚非予之初意也先生桑梓世契故敢竊有請焉其勿多遜予乃躍而起曰幸哉故人之有子也干戈徧海内于兹十年千金膏粱徃徃不免束縛以歸山岡樂羊忍中山之羮王裒誓西向之坐衆暴寡智欺愚何所不有朱門大第莽為丘墟求麥飯一盂以洒寒食者鮮矣於斯時也乃能脫屣風塵之表稅駕山水之間撫童子之釣逰慨前人之種植與老翁稚子來徃風晨月夕歲時伏臈館授來歸唯諾庭闈自相師友地爐榾柮風雪閉門無蔡州夜半之慮秋風鱸鱠澹泊自安無東門牽犬之悲此漁樵所以為得宜吾子之深有取也推是心以徃則負米百里轉客行傭奚必多遜古人將使其親陶然一丘一壑筆牀茶竈葛巾鹿裘寄邪許於嚶鳴襍吾伊於欵乃侣魚鰕友麋鹿山間明月江上清風相與為無盡藏仁義之美施於令聞又豈待芻豢之恱口文繡之被身然後謂之能養哉不知者惟徇其名知之者則見其登山而采玉不知者徒泥其跡知之者則見其入水而求珠漁樵云乎哉於是進於道矣苐不知會稽之綬渭水之車富貴逼人禮羅交致亦思所以早見而預待之乎子歸試從迺翁質之尚分我半席心泉記去郡三十里有泉泓澄回抱林麓乃王步秀氣所鍾居是間者存心蕭氏蕭氏為里著姓存心雅好文家庭雍睦二兒英英長宗禮次宗𤣥幹蠱用譽迺翁俯仰世變標致自如晚益和易心之所玩無適而非泉遂以心泉扁燕休之所屬予記之予笑曰心出入無時泉在山則清出山則濁金玉綺繡可玩者衆矣而獨有取於泉此何心哉曰噫吾宗盛時東西花竹連隂亭館清邃觴詠無虚日玩好之物不一而足亂來人物俱盡僅留斯泉與童子無異白髪照影悠然今昔之思於是泊與澹相遭脗合無間此心泠然泉之清也此心湛然泉之鑑也泉之冽吾心之潔泉之幽吾心之休感於心者與泉流通遇於泉者與心融貫心即泉也泉即心也夫何出入清濁之有予聞而善之請推本以申其說粤自鴻濛肇判髙下散殊人身雖㣲然心之虚靈有以通千載之前攝三才之蘊水性本下然泉之為物湧出懸崖峭壁而瀉於千仞之巔盖人為萬物之靈而心者其主乃天理所會水居五行之首而泉者其本乃天一之初由是言之心者人之天也泉者水之天也得於心寓之於泉殆人而天矣易䝉卦象傳云山下出泉君子以果行育徳徐子曰仲尼亟稱於水孟子以源泉有本啟之夫所謂果行育徳所謂有本皆指心而言聖賢豈欺我哉則存心之義有取於泉也尚矣誠能於此既有本以涵養馴致於果行育徳使方寸充滿浩乎日夜之所息旦晝不得以梏亡猶泉之本源瑩徹畜而陂池注而江海泥沙不得以相混也彼形勢聲色斃而後已譬諸坎井汚瀆甘心没溺惡足以窺涯涘哉闕文忠天慶觀乳泉賦至汲者未動夜氣方歸愛其深達華池妙理黙探造化之端倪此心泉之說也知之者盖鮮矣邂逅出此得全於天清風自來明月時至煑茶留客歌濯纓其上予雖老尚能聽之中和堂記安成自通真子顯于宋氏多名醫城南尤著者列郡監司太守交章羅致雲萍録具有考焉今浮梁津友蘭氏又城南流派之屈指者世襲篤厚顔堂中和過余質其義傳曰中者天下之大本和者天下之達道無所偏倚故謂之中無所乖戾故謂之和醫之取義最為切近蓋天地萬物本吾一體中和以性情言人之有生同禀天地五行其感疾也亦由隂陽五行隂陽五行豈在性情之外哉善醫論病必推其所感大陽少陽陽明大隂少隂厥隂支分派别不使少有偏倚即傳之所謂中也其治病也必察其表裏虚實何者當補何者當瀉不致少有乖戾即傳之所謂和也然必先明已心恒不失其性情之正然後施以活人則端本澄源自然中節非深造乎道不能也而昧者徃徃易視之友蘭家學淵源殆深有見乎此其所由來逺矣余昔承平時客澗西彭氏十載彭劉東西家悉其父志翁為人恂恂焉不事表襮清儉自持進退周旋雍容謙遜澹泊安分所至争迎平生未嘗議論人長短治家嚴整子弟小有過失必加捶辱雖對賓客不少恕負販賤㣲毎極優容感恱賛歎之聲載途坐閱聲華玩世韜晦浮沈閭里間無毫髮幾㣲形於顔面始終不移即其行事何莫非中和發見豈獨醫哉吾嘗謂志翁厚種而未食其報天意似不可知壬辰以來天下鼎沸向之朱門大第莽為丘墟友蘭屹立其間弟兄子侄俱不在人下四方邀請旁午駢肩累迹雪霜風雨昏莫叩門即奔徃赴之了無徳色時時衝冒鋒鏑暴横之輩舉不敢相加送迎恐後由是所至無留礙益廣其施田廬恢拓過其父百倍然後知積之深者其發也必𢎞志翁之天於是乎定斯堂斯義蓋友蘭能以志翁之心為心故名實相似光振前後愈熾而愈昌子孫登斯堂者又能以友蘭之心為心聿追厥祖勿矜勿怠勿以貧富異心勿懷小忿而自相殘害則斯堂斯美彌久而彌固矣彼要利欺心慘酷自斷隂陽經絡昧於脈虚實補瀉逆其施草芥視人横行鄉曲亦嘗升斯堂而聞所謂中和者歟較之友蘭何啻霄壤蚩蚩之氓委命束手莫措一辭而其人自以為得忍哉永新刋徳翁嘗言吾父以精藝名鄉邑恒恐藥誤傷人夕必焚香祝天乞祛䝉蔽後值北兵討叛脫死屠城終于牖下世業相傳廬陵某氏稍聰明知讀書負才壓同輩凡危急請召無問親疎逺近必厚賄乃就責備多端中人之家不敢屈致年五十二子孫寂無聞焉於斯二者一勸一懲中和餘慶其未涯也友蘭離席謝曰先生之賜多矣請書以朂後人遂為記石初集巻七

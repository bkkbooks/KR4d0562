body:
  text: 石初集巻一元周霆震撰五言古詩美人昔燕趙美人昔燕趙嵗乆江漢間軒忩粲明霞被服羅綺紈頩怒恒自持含意詎敢攀一朝強暴陵相從即懽顔傾身作歌舞豫恐恩意闌新聲與嬌態取媚巧百端主家隔風塵庭宇深且完豈無昔共處永夜青燈寒魂夢各所依寜復相徃還沉沉九秋霜履屨思蒯菅娟娟中天月照影留空山盛時槩無虞末路良獨難棄置勿重陳使人摧肺肝濯濯江漢女濯濯江漢女幽貞出良家十年守空幃夫婿天之涯良夜秉明燭悉心務絲麻憶昨秋風起河洛昏塵沙傷彼朱絲絃逸響趨淫哇朝為御溝栁莫作陌上花世態固應爾委置勿復嗟所悲在新春雨露凝朝華感此深閉門淵氷慮彌加蔵玉萬仞岡守護盤龍蛇投珠千頃波光燄驚魚鰕夫壻㑹有期豈問嵗月賖寸心如皦日終始宜無瑕燕山萬里雪燕山萬里雪不作黄河氷𤣥徳専所司曷為失其慿赤雲竊乘間遂逐炎風興連延土山焦反更繁青蠅毛炰列饔餼臭腐日以升禋祀古有嚴孰與存芳馨昨夢觀圜丘玉輅蒼龍乘正氣六合周瑞花反嚴凝坐見昆岡火瞬息投淄澠願言哀江南盡洗毒霧蒸潮生浙江白潮生浙江白積水何其多悠悠子胥魂千古終不磨東南溢潢潦汙瀆紛旁羅獨此障百川晝夜激海波力排坤軸轉正氣通天河從星趣好雨浴日陽之阿蒼蒼紫微垣弁冕鏘鳴珂宜蒙湛露恩領袖湔甲戈雲陣聲萬雷銀山勢嵳峩吹嘘蛟龍翔奮起驅鯨鼉功推五行首朝宗諒無他種瓜南山下種瓜南山下實晚霜落之冒寒拾瓜仁生意或在兹収蔵篋笥中恒恐鼠蠧窺羣兒顧竊笑癡絶将奚為昨聞北里富晨昏厭甘肥禍機隠驕溢瞬息靡子遺嗟我食無肉藜藿每晏炊俟時啓包裹瓜地審所宜殷勤謝春雨庶以忘朝飢十五紀懐止酒已多日當秋病連綿一忩此寄傲晏起仍早眠豈不念佳節負此明月圎叩門客語我蚤作星尚懸白氣出東北横貫西南天夜凉步中庭所見還依然力疾起語客喪亂今十年謂天蓋無情埀象在目前謂天其有知吉語皆虚傳未遑悉吳越況敢談幽燕須臾報軍出明日攻富田焚掠先近郊斬艾無愚賢咫尺成俘囚妻子疇能全戒客姑罷休世事從推遷客去深掩耳閉關涕澘焉大風發屋雨雹交集大風西北來屋瓦去如走麗譙雙闕壮關楗决樞紐蒼蒼泮宫栢枝葉互紛糾移時折偃蹇巧力無措手西禪鐡浮圗摧仆如拉朽臨江戰樓飛夾巷坊額剖恍疑㑹羣龍奮發交怒吼泰山恐崩裂寜復計培塿老夫閉門卧雨雹散忩牖倉皇正衣冠力疾坐良乆天威俄咫尺性命亦何有黙悟貴存心淵氷慎吾守嵗莫柬張梅間憶昔慕逺遊朝華沐春露焉知喪亂後林杪秋葉蠧間闗西州門寒日收踽步尚餘平生友示我廣平賦耿耿河漢輝幽幽氷雪度終慚媚求悦寜悔貞取妬朗吟發孤音明月落庭户世事殊未涯嵗年忽云莫有美君子心永言金石固除夜書懐一榻陋容膝老身兀枯株淹留恒鮮悰況兹嵗云徂兒女雖茍完喪亂多異居同也乆鄉曲奔走一飯驅鳯也妻女累近亦反故廬拙謀康最少甥館横溪隅阿巽孀七載忍棄吳氏孤靚家食指繁績絍勤養姑市㕓病株守環偶錐刀趨顧我此相守出入孫符俱孩烏頗機警戱弄聊與娛止酒動經年宿病無由祛晚餐率减半夜枕氣始舒宴逰多却避禮節那能拘親友既少存存者亦暗踈駸駸齒髪敝勉勉筋力餘撫事百感集來嵗知何如存亡且未測艱苦焉足虞骨肉姑眼前開懐盡斯須地爐熟春茶明燭散欝紆忽憶孤山夢風雪隨吟驢梅花千載心皎若滄海珠服之配明月閲時終無渝和蕭仲儀十年樹桑柘結屋山澗旁辛苦蠶絲成将備公子裳緇塵一朝起冠盖紛劻勷飄零落綺紈翕忽歸𣺌茫鮮鮮皮卉服搖曵凌空翔感此桑下心臨風時自傷招隠衰年際時艱屏居謝輪蹄學圃事雖晚披荒漸成蹊芟夷敢辭勞常恐滋蔓迷夜氣方油然養生無端倪雜蔬雨意緑籬落新筍齊攝衣晨理髪好鳥當户啼物情適自如睠言契幽棲干戈且未息童稚憂提攜外美奚足多澹泊恬朝虀援琴思南風濯纓鑑清溪白雲乃吾友延佇蒼山西暮春述懐三月十二日冦據郡城勢焰虚張人情洶洶水東民義廉得其微突起奮擊迎郡侯収復城池殺獲埀盡餘衆遁去妖氛被東南醜類日響應承平七十載倉卒駭觀聽堂堂忠節邦奕奕守與命流血動成川分奔馬蹄競羣兇首被赤心額雙懸鏡赤以欺愚庸鏡以眩昏瞑張皇禮像設誑托西方聖燒蠟動千斤相承勢彌盛喧呼短兵接迅若斤斧運殺人先剖心刳腹抉肝腎攟摭窮窖蔵備網羅機穽官曹列廐牧民屋委灰燼郡治歌舞塲朋從悉梟獍頗聞連騎出近郭更蹂躪計程倐徃還日以嚴示信距城此雖逺疇敢保安静聞雞心即危過午魂始定顛連混寃親跋涉無老病晨興不遑夕永日飢餐併豈復虞道途所悲室懸磬妻孥且目下僥倖須臾命近傳某澤中逆料絶窺偵兒啼誤失聲掩捕一朝盡回頭顧童穉反覆深砭訂事㑹固叵量寜能忘戒訓因思少壮日膏澤溥涵泳冠蓋先送迎農桑雜歌詠閭閻飫粱肉厮養翹車乗飛潛偕動植一一遂天性焉知厄遭遇埀老百憂並聖朝果何負姦宄妄依凭得非湛恩隆竊禄隠䜛佞貪冒逓相蒙浸淫成此釁中天揚日月光彩爛相映雲霧偶晦𡨕何能滋疾疢衆心一此理磨濯光愈瑩化機黙囬旋民伍奮豪俊川東事大竒氣與北風勁劃開聚石圗捲入背水陣翩然破竹勢節解自迎刃郡侯起収集轉盻復歸正誓将掃餘孽側耳四方靖麥秋告登場秔稻亦已竟死者可勝哀存者聊自慶蕭條舊邑里庶免憂釡甑書生守衡茆才具非濟勝中宵投袂起踴躍歌解愠四顧掃曀霾如疾脱危證親知稍慰藉松菊尚三徑雨露極昭蘇草茅微報稱忠謀慮或過深計衆多屏薫蕕絢疑似玉石互緇磷吏弊襲貪殘罕由慈惠進吾侯新涉難庶務職其柄撫定在哀矜朂哉慎行政清明憂懐不知春病雨門日閉今晨又清明倐忽如夢寐茫茫宇宙間擾擾干戈際寥寥邑里舊莽莽身首異悲風起平原鬼泣海為淚萬死天不墳況論弔與祭先塋顧非逺跬步涉疑畏雨露日夜深蔓草青繞地孤生髪種種去日已川逝旦暮未可知何時及來嵗凄然心自割俯仰寜不愧野人或典衣强欲存節意邀我坐茅簷未酌意先醉豈無閒花草黯慘不成媚興䦨村鼔急鄰犬衆驚吠天運夫何如臨風獨三喟騎曲府辟副監州不查吾監郡中憲公之從子也騎射絶人部伍嚴整身先士卒所向崩摧惜其巡厯匆匆功弗克竟步行擁千夫不敵單騎戰躍馬奮戈矛何如馬頭箭壮哉副監州巡厯迅飛電秋毫戒侵掠追捕身獨先彌年賊氣驕膽落驚未見借我一月留坐使民居奠殘髪殘髪不可紒晨興日加梳顧慙雨露沐此豈冠冕徒夜來秋風深傲兀驚頭顱亂離亦已極時序復易徂青燈一斗酒不樂将何如莫折草間葵莫折草間葵葵根朝露深朝露恩豈私中有向日心衆草濫生意延縁托幽隂幽隂人迹稀狐虺交相尋我行偶徘徊海色微穿林玩葵試披草露氣俄滿襟葵心苦不多其柰蔓草何哀枉春心注成湩晝夜深長育枯梢晴自芳寒燒雨仍緑如何寃死魂不及閒草木送曠伯逵歸洪伯子郡中彦移居乆洪州才宜當路知濟勝偕名流皎如明月珠瑩若狐白裘含章澹中懐清識雅好脩顧瞻桑與梓賦詠忘淹留干戈迫嵗晏逺道妻孥憂朔風吹征衣日落江上舟願言桑梓心江水深悠悠嘗艱平世隠大姦禍起連干戈紛紛殺戮餘轉徙嬰札瘥喪氛不可望散漫翻洪波號呼逓漸染瞬息俱滅磨向來膏粱子被服華綺羅菅蒯倐纒裹委棄山之阿顧匪金石交厄㑹其柰何吾貧老環堵與世常蹉跎況此災患林屏蔵謝經過晨夕堅苦淡分安志無他闔門或茍全天賜良以多有時誦陳編桂竹供婆娑後日将焉知且復託永歌晨出仲夏沐時雨清晨步郊墟平疇日以緑民瘼其或蘓回頭語田父努力勤耕鋤我朝世忠厚品彚均涵濡盜賊妄干紀旦夕當殄除曠刼滄海深幸兹邇平途爾曹活餘息詎識勞廟謨稽首萬億年無疆夀皇圗二月十六日晚青兵逼城紅不戰而潰暫匿近壕小屋夕走横溪孤藩酣春霖戰艦一時集喧呼驚棄甲填道戈可拾黄昏烟燄起近郭俛藏蟄夜深相隨行問道衆岌岌敗走餘小醜邪徑俄掩襲呌號互失亡顛仆免繫縶䇿羸叟狼顧襁孺婦飲泣帶褫衣茍完靴沾足難給相失但聞聲疑路翻却立屢休幸雞鳴襟袖寒氣濕貫魚累童稚前阻後惶急縈回阡陌間恒恐追騎及重岡釋心掉湛若恩露裛推挽達人烟開顔見舂汲兒扶集悲喜㓜兒贅横溪蕭氏親故走迎揖坐定飢渴生酒漿更勸挹驚魂乆徐定強笑寄於悒翻思墮危機性命在呼吸家鄉固殘毁所幸存井邑杖䇿歸去來戒此輕出入寄朱玉林兼柬蕭孟敬仲儀清商泛空曠肅此林下廬中有學仙子佩服明月珠泯然樵牧間乃與螢爝俱南隣隠抱璞世守甘自愚孟也亮以質仲也淵而姝千金發竒觀邂逅意不殊攬結誓綢繆幽貞諒無渝物情貴眩鬻悉意時所趍煌煌席上珍待價當何如停雲師友吟親友吳彦章客廬陵井岡髙氏五十年貴逢志翔允脩希良凡四世其初客也允脩未生暨脩子有室始終靡它彦章死惟一孫喪明允脩家亦落猶惓惓念之此停雲師友吟之所以作也停雲其館客之所親友吳彦章居鄉衆稱賢早從髙氏客晚暮交益堅當其遇合初志翔方盛年圖南文治開䆠轍首着鞭志翔南雄路教授貴逢淳厚風種善猶力田允脩時未生兆已占𤓰綿脩今埀五十行且開曽𤣥俯仰歴四世殆若絲糾纒徃者風塵昏沴氣滋蔓延奄忽彦章翁父子偕重泉孤孫惟子剛憔悴目疾牽相依幸老母二㓜嗟纍然去年屬大饑雨冷萬竈烟溝壑無貴賤骨肉甘棄捐顧此凋瘵餘詎敢自意全允脩奮衣起為義吾所先吾師遂泯没吾分愧老天耿耿吾寸心永矢徴逝川雖非力有餘此志必勉旃提攜竟全活如正大厦顛如煎續絃膠如拯溺九淵愛深不自足逺慮尤惓惓今兹掃停雲致客禮貌䖍子剛無目就養館中復延客訓其子從容語二子剛也予周旋息雖今十齡於我朂簡編教養俾成立吾責始息肩歡欣揖其來席以廣厦氊父也酬翰墨兒也趨誦絃匡持每多方苦語精磨研油然古人心如出未亂前吁嗟取友難邇日義愈愆西華衣葛帔論交憤莫宣叔敖賣薪兒性命優孟懸紛紜落穽石舞智馳輕儇髙堂尊面諛千金肆華筵芳馨意所使陸海羅珍鮮厭飲臧獲曹出入車馬填故人子若孫往往憂患煎十步九頻蹶飢寒日顛連眉攅若将凂況望引手援懿哉吾允脩古道今其専峨峨路邉石已俟來者鐫力行庶終惠益永世契縁眼中富交逰落筆詞争妍片言倘終靳髙誼誰當傳維昔我彦章停雲硯席聨折花春日吟聽雨秋夕眠焉知曠大刼夢幻情事遷凄凉餘白髪顧影深自憐安得同心人和我師友篇紀病干戈餘刼數邑里衆死亡楚氛日晦蒙恍若初望洋況能辨玉石狼顧駭且僵哀哉疇能違付此烈焰場呼嘘蔓親隣苦毒煩中腸老妻卧沉沉念我新著床喚起趣湯藥翼我期夀康寜復憂其危且為我周防卜稽倏遇困卦兆非禎祥妻命竟莫逃苦語應難忘提攜乳下孫戱弄每在傍相從絶可憐溘先朝露翔我時属方劇飲恨神慘傷棺歛付兒曹草草歸山岡逝者忍長痛來日仍叵量闔門罄委頓形勢尤倉皇幸天埀至仁坐覩日月光諸兒遂遄起再拜酬穹蒼目前強自慰藥物資先嘗老身僅一息骨立勉自強屢危迄就理所賴醫士良服餌逾十旬缾罌竭儲蔵扶持力更無舉體皆瘡瘍脾胃苦易侵滋味多所妨𡨕𡨕等縲囚兀兀類耄荒推殘甘委棄感憤涕泗滂夜來秋日夢神氣殊飛揚起坐不成寐意與西風長願言借吹嘘濯髪晞扶桑石初集巻一

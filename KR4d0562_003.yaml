body:
  text: 石初集卷三元周霆震撰七言古詩杜鵑行哀王孫作也我不暇自哀古帝魂春來却念今王孫王孫馬蹄去何處但見黃鶴落日故宇烟塵昏我昔帝蜀空名存絶憐王孫玉牒尊春宮天鵝壓酥酪凝香夕帳貂皮溫紫茸吳姬河西曲白馬集賽鷹絛捫居民咫尺甚天上冠冕臣僕羣趨奔漢川一炬冦飛度四載寒食如荒村暴骸泣霜關月老恨血埋雨江波渾投鞭七寶委道側落花送客慙春恩勸歸我亦久流落幾欲出口聲復吞莫道人生歸去好江南無復弔王孫送吳縣丞赴江西省掾并序至正十有六年春董銓黃昭二尚書暨亷使吳公當奉詔平戎江西適進士吳師尹永豐秩滿攝廬陵雅為司徒所察以省掾徵廬陵之民歎息其去余解之曰師尹攝廬陵信賢矣然化行一邑江西二十有五路司徒視諸侯王伯仲間朝廷付托之重郡邑觀感之深舟車轉漕之往來甲兵錢穀之出入一言取知於上大江以西莫不鼓舞其賜豈獨廬陵哉况今世變滔滔毅然左衝右潰而不可奪者悉由進士中來故司徒之用人也郎中布延倡於前而江西遂雄天下都事吳公奮於後而吾郡之幾殆旋安師尹此舉雖爵位功業未及二公然常存豈弟之心安知來者不如今耶甚哉我朝進士得賢之盛司徒之善於用人也微司徒之明不足以取人於進士微進士之盛不足以回天下之太平吾固因師尹之舉有以卜司徒知人之明而進士之不負朝廷也必矣遂歌以遄其往俾臨難易節者聞之大江西上輿圖開繡衣傳詔從天來中書機務政輻輳贊畫獻替須賢才吳君壯年進士選錯落襟抱皆瓊瑰攝官縣庭治方洽入掾省署班遄催憶昨初從監郡日慷慨艱難為時出國恩未報冦縱橫撫字差科殆無術火炎水濕良苦心電激颷馳恆定力吏姦毫髮徹蔽欺民瘼顛崖獲蘇息此行誰道案牘輕司徒深堅瑞州城乘􅔕憲使榮晝錦尚書列坐分兵刑九重憂顧在宵旰四方利害推亷明士夫講學待今日勿以富貴移平生馬蹄佇看長安遍黃河水清喜重見銀箭宵鳴白鴈傳寶圖曉駕蒼龍獻日繞賓春上林苑花迎謁帝含元殿燕山佳氣五陵高鳳池早頌櫻桃薦鬱孤􅔕馬行粵自壬辰冦興不覩風憲之巡歷五年矣御史監察阿爾斯蘭南來列城想望風采既而貪侈日甚亷馬二監察按臨廣東留鬱孤以待參政全子仁佐之發其姦籍舟載黃金千凡黷貨之物具載日録委官押赴洪都以俟命下忠憤之士相與賦詩以戒來者云鬱孤臺前江水深繡衣馳傳千黃金翻然按劔起同列如見咫尺天威臨郡中新參全太守子仁由郡守升參政捕起龍蛇恆赤手從容杯酒示先機談笑拾之如拉朽五年羣盜糜東南百城黷貨春夢酣堂堂憲府卿相列詎意僚屬藏姦貪送官檣連鎖晝寂夾道傳呼記來日君恩可負天可欺投畀北荒豺不食濁河一滴玷濟流共器那得同薰蕕當官而行義所激此舉庶減臺端羞小儒初心思許國萬事無成頭已白箋天願賜秋風高吹送霜威遍南北送武昌馮子中亂後還鄉東南形勝㑹武昌蜀江滔滔經漢陽北來冠蓋集如雨甲第壯似諸侯王平明飛箭馳校獵清夜列燭歌傳觴貂裘鞍馬美少年春風何處無垂楊一朝平地灑新血但見落日塵沙黃金章骨折荒草臥玉貌跣泣泥塗僵嗟哉馮子命一縷顧影錯莫驚鴻翔時從知己話疇昔留滯五載忘他鄉千金結客心尚在豈效兒女徒悲傷昨聞湛露被寰宇夢寐桑梓情難忘築城漸喜還漢月㸃鬢仍許先吳霜相隨長鋏幸無恙况見峻坂成康莊子孫他日又兹始五世八世天其昌嗟我洪都百戰場大臣精忠逺有光生靈一道在掌握若泛巨海操龍驤到家故舊定相問江右何恃全金湯司徒勳業有如此願子備述毋匆忙過玉成寨玉成三面堅如鐵穿井無泉援兵絶去年此際萬人登已是如今髑髏骨刃飛丁壯屠嬰孩婦女分配囊資財浪傳古昔險堪恃曠劫竟墮昆明灰我來似涉羊腸坂道遇遺黎拭愁眼故人何處覔遊魂陳德新主戰咼於永新罵不絶口而死雲樹鴉啼寒日晚城關曲雞鳴海東黃塵起落日關山氣如水餘民髓竭欲無生月費給軍須萬計尚書前時來使臣近者太守宴將軍割鮮飲醇互來往白晝走馬邀紅裙兵部尚書黃昭奉詔逺出按兵撫建間其行營經厯伍闕章安成醫生也榮遇京師出黃幕下自撫抵吉以督兵為名招權納䀩郡守梁水寨都事吳相與玩冦偷安酒食徴逐無虛日殆承平時所未有布衣小儒寸心赤咄咄書空長太息閭閻無奈覆盆何帝禁九重方旰食題奔子溫南城抱關遺藁并序子溫由丁亥江西乙榜職教旴之南城念幼失所恃繼祖母恩育之勤别其父廣胖攜妻子奉祖母就養時辛亥冬也明年兵興出入鞍馬間掌城啓閉甲午歲大侵殱焉又二年旴經歷孔興之避難來廬陵持子溫未死前抱關遺藁詩若干首反覆氣化人事哀怨窮愁歷歷如傳訪其弟子志授之子溫廣胖冢嗣也余交廣胖四十年其學務博采研精文章不肻泛泛隨人後試有司連不得志挾其長鳴京師歸亦老矣於是子溫薦于鄉邑人遂羅致恐後旁郡又或奪之以往是翁平生讀書效僅爾鍾美必在子溫而壬辰兵變以來上下隔絶子溫南城哭其妻若子而身殞祖母煢然後亡廣胖旅殯凄涼家人淪沒殆盡嗚呼子溫垂絶之日顧祖母白頭異郡割恩不可忍乃翁弱弟藐然故鄉烟塵中廣胖顛沛連年念老親愛子幼孫數百里外杳不知存否而抱恨以終死如有知父祖子孫相見於地下痛當何如哉天之未泯其傳猶幸有子志在則子溫之録賴以布於朋友始終之際因有考焉不然賫志丘原野草同腐矣余茍全性命朋輩零落無幾讀子溫抱關之作重悲廣胖故託永歌以屬吾子志子志其善自愛庶足慰父兄於冥冥奔氏一門唯子而已黑風吹角孤城裏萬竈塵生烟不起白頭祖母骨相隨天入荒山夜如水惜哉奔子修程促淚墮人間抱關録遊魂歸省父何之旅殯孤村春草緑當年煮字嗟無術商聲寫入山陽笛餘音似和祁孔賓又似飯牛歌寧戚蕭蕭霜葉吟邊落有弟零丁此漂泊秋風無地賦招魂明日城東問歸鶴海潮吟北風翻天送高梢西江浪起如海潮千艘平城箭飛雨城潰曽不煩兵交馮夷啓扉衆爭赴萬棟烟氛畢方怒司徒命盡撫州營國公匹馬杉關去遡流西上旌旗紅列城樓櫓轉盼空干戈七載遍宇內朝野狼顧無英雄悲哉上下交征利四維不張巧蒙蔽憂來却意賈長沙痛哭當年繼流涕豫章逝水通錢塘漢川北渡趨洛陽洗日咸池佳氣正聞雞矯首向扶桑劉觀復止足軒陶朱去越乘扁舟布衣卿相難久留子房定漢晚辟穀赤松可學思從遊此遊意氣空寰宇家國安危關出處功成名遂身獨全千駟萬鍾猶一羽如何海桑人白頭紛紛燭下尋牙籌馬上朝雞聽未了又擬跨鶴趨楊州壯哉脫頴吾觀復物外一軒名止足風流文彩祖子孫平生無殆應無辱有時展卷評功臣凌烟上遡筆有神敲推得句亦妙契直欲三絶追唐人太行覆轍車無數我獨衡門樂安步紫駝翠釜生野烟我寧晚食依環堵畏途留此示康莊戲寫陶朱贊子房滿院緑陰春雨歇客來推户煮茶香郡城高郡城高昔人隳廢今人勞城中居民負土石城上畚鍤卒伍操去年外壕深地底吳員外張録事今年內城插天起紅巾紅旗東接漢陽山白璧西沈贑江水江參政杵聲未改築者殊人事往來如傳車荒碑斷礎悉輿致仙宮梵宇空無餘歡呼攔街走童孺明年移家城裏住抱關舊卒鬢垂絲淚墮鴉啼城下樹城堅池浚侔金湯此地他年為戰場喜雪庚子臘月初旬雪再作十九日大雪至二十一日彌甚深可數尺三日乃止辛丑元日早起雪塞門十三日夜半又雪皆平地尺深喜而賦之殘年新春凍不開大雪五度漫空來南州病熱已十載造化有此真奇哉夜聞翔風撼天柱恍惚萬馬隨奔雷乾坤正氣有先至密運亭毒滋其媒雲旗乍翻搖若木濤霜却卷飛龍堆女媧廢煉深縮手河伯失據俄驚豗𤣥冥振轡祝融遁怒勢欲遣崑岡摧臥龍潜蛟起奔走舞鶴翔鳳爭徘徊瑤池觴罷灑餘瀝漢皋相贈投瓊瑰蒼山一夕頭盡白貧户得句侵晨推朱門豈必異衡宇埋沒弱栁餘枯梅我疑真宰偶戲劇往往玩世如嬰孩故將空色種天上大巧六出無根荄要令六合反混沌寧許萬象蒙塵埃兆豐呈瑞悉餘事邂逅淨洗昆明灰西流壺嶠應自反咫尺清淺移蓬萊內廷稱賀論邊事坐想勑使傳宣催蔡州鵝池久安堵整頓宇宙須雄才涓人自昔負高見逺去求馬何時回燕山從爾深一丈掃地為築黃金臺犬雞嘆雄雞奮翼銜怒蛙蛙被啄取聲咿啞犬來雞斃蛙竟逸轉步犬驚逢惡蛇兩强相厄須俱殞過客驚怪頻咨嗟君不見下宮將軍輕杵臼緑珠金谷來孫秀世間萬事每如斯莫負尊前卯時酒虎墮井十二月十三日庚寅神岡距郡十里虎晝攫人轉身竹籬陷入眢井衆共殪之郭西猛虎勢莫當攫人白晝來神岡暗中推墮若有物眢井百尺籬根藏凍泉收聲甃為土轆轤綆斷苔蘚蒼眼花誤落爪牙廢棄置有待摧强梁酸風飛沙寒日黃四郊流血皆戰場乘時吞噬恆妥尾翼以倀鬼高駝翔北平將軍老且死泰山哭聲哀怨長豈知鑿池古設險邂逅一蹶由天亡吁嗟此物肆無忌妄意流毒窺城牆千夫駭汗手莫措造次坎窞侔干將君不見東門狡兔殪牽犬西江孽蛟終自戕貫盈兆此多未悟來者紛紛投土囊人食人髑髏夜哭天難補曠劫生人半為虎味甘同類日磨牙腸腹深於北邙土郊關之外衢路傍旦暮反接如驅羊喧呼朵頤擇肥胾快刀一落爭取將慿陵大嚼刳心燎競睹兕觥誇飲釂不知劔吼已相隨後日還貽髑髏笑陰風腐餘犬鼠爭白晝鬼語偕人行銜寃抱痛連死骨著地春草無由生睢陽愛姬忍喋血長安仇家俊臣舌攄忠疾惡古或聞未覩烹炮互吞滅五雲深處藏飛龍天路險艱何日通皇心萬一閔遺孑再與六合開鴻濛上營門上營門外將軍樹幾度春來復春去北轅南斾萬人行移種東風無定處䖍州僞將昧禍機熊逺杖牧圉持旌麾徐臨危走檄盟白馬挾詐志臠三狻猊孫曽履附陳運肘分部掩之慿卯酒羣庸貪餌悉輕生談笑削除天假手惜哉鄰醜疏防間反更放虎來深山招安成入郡倉皇出此殆無術民命一髮懸天關老夫厭觀陳雲黑中夜拊膺談失色古來反覆事難平願天早賜扶桑白天問補貝丘豕立俄人啼淮水失却巫支祁萬牛腥聞紅帕首天狼反被青雲衣塢金遞遣髑髏守日注鬼籙停生機風塵展轉逾十載意者天怒民澆漓故令六合日顛倒人類滅盡將無遺云胡玉毁石自若熒惑揚彩三階微灃蘭無實荃蕙化跖蹻往往嗤隨夷姦凶殘忍源源出福善禍淫殊反易殺人白晝臨通衢長劒大刀爭割食東家處子西家摟父母吞聲淚偷滴書生平日苦自信坐談性命成迂僻有人抱膝吟草廬夜夢史遷紬祕書共工舉頭天柱折五丁鑿石岷峨枯有窮飛箭落九日防風戮骨雄專車跨秦歷漢凡幾劫宇宙戲擲猶摴蒱君不見邯鄲空國長平陷又不見焦土咸陽總寃濫區區反覆焉足云老天為質由來暗秋宵見月青天過雨明月佳不飲奈此秋滿懷援琴屢起却復止音韻惜於同時乖西風笑我深閉户吹送亂葉鳴空階翩翩從爾千萬態我自作我隨無涯蓬萊㑹見清且淺未許泥滓沾青鞋石言邑城夏暑增築基崇數尺壘巨石為之搜抉幽遐逺近煩擾南山白石堅不朽鐫磨誓入良工手平分陛級肅降登橫臥津梁逹奔走椁成取重侯王家不惜千金市長久從渠楚漢决雌雄坐閲興亡屹相守寧知敝邑如殘星十年豺虺喋血腥今兹成壘方改築流汗萬杵當炎蒸城基疊石崇數尺搜括隱匿慿威刑斷橋發冢殘寺觀民舍隳突翻階庭千夫引綆日馳逐顛踣道路無留停石乃言曰我生剛介根元氣落落孤高蟠九地既不得補天遇媧皇又不得填海從精衛包羞轉徙近汚渠反為姦凶嚴屏蔽何當天威發怒雷豺虺骨與城俱摧此時飲恨庶吐氣盡碾暴骨為飛灰反覆吟東關晝宴宵流血北里暮耕晨建節金珠無脛走如飛奄忽廢興那忍說君不見青岡頭墓磚云是晋桓修發掘近遭羣盜手峩峩疑冢已千秋埋寃樹郡城西郊官道側有樹名埋寃往來必於此少息因賦托興庶幾有位者聞而動心焉出城十里西南去行投經過倦休處崔嵬古幹絡蒼藤相傳此是埋寃樹樹名那得呼埋寃閲人纍歲官道邊朝吁械繫逮詞訟夕敝鞭撲逋稅錢富豪招權逞濫入孱弱破家哀孑立幾人飲恨淚徹泉樹不能言天為泣埋寃得名良可悲郡中守令知不知延平龍劔歌鄧克明率江西之黨攻延平江州八月破之日鄧亦大敗奔還失亡甚衆延平之淵深復深白日下照蒼龍吟古來此處㑹靈物中有未死英雄心黑風一夕噓蜃氣坐看海州俱陸沈咄哉蝮蛇敢流毒鼓召妖孽紛來侵老龍掉尾才一怒百怪灑血腥淋淋書生投筆起大呌稽首再拜皇穹臨龍兮龍兮爾之潜也已千載豐城故鄉昨失守宜叩天閽勑牛斗下取老蛟心血剖指揮九日付羿弓馳檄風雷殲巨醜胡乃坐觀潯陽肆鯨鯢魑魅魍魎羣相隨剜肌剔髓四海糜遂令魚腸豪曹甘毁折岐山之鳳鳴聲絶忠臣扼腕空白頭赤子腐心眼流血時哉好從檀溪踴躍起的盧喚取黃熊赤豹來清都并與宋帝獨驅之長刀龍門將軍天山之三箭神㑹大冶飛昆吾迅掃六合塵糢糊我當逺求華陰土助爾光芒增快覩問天洗甲挽銀河蘇息蒼生溥霖雨志感老來不能夜飲中秋無月靜坐山中因憶往年客橫溪詩朋盛集老桂初開列坐其下諸生倡酬達旦居人驚倒聞所未聞重至桂無復存但見平地立馬其中追念亡友思恭愴焉良久遂成長句奉寄西愚先生聊志今昔之感丙辰年石初書海風吹雲通萬里浙江勢合潮聲起酒杯無分月含羞獨步徘徊桂香裏秋深蕭條晝掩關良夜偶此須臾間老逢佳節偶懷舊昨者夢自橫溪還溪邊故友重泉隔却憶當年㑹騷客十千清酒買城中舒鴈初肥鱸鱠白庭前古桂高婆娑酒酣能賦得月多野人側聽驚絶倒寧許扣角聲相和重來無處尋高桂夜聽馬嘶林葉墜淒涼舊曲付吹箎吟斷清商復誰繼我愁問月傾肺肝月亦憐我霜鬢殘平生取友恆落落㑹面非少知心難古今何限西州路送迎只有山如故作詩寄語座中朋難覓人間許𤣥度石初集卷三

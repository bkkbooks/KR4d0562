body:
  text: 石初集卷二元周霆震撰七言古詩古今城謠并序國家承平百年武備寖弛盜發徐頴熾于漢淮武昌南紀雄藩一旦灰滅洪省堅壁冦蔓延諸郡水陸犬牙北來名將相繼道殞丞相出督步騎直抵髙郵事埀成以讒廢方面多貴遊子弟貪鄙庸才漫不省君臣大義草芥吾民虛張戰功肆意罔上誅求寃濫慘酷百端重以吏習舞文旁羅鷹犬意所欲陷即誣與賊通其弊有不忍言者間存一二廉介則又矜獨斷昧逺圗坐失機會民日以敝盜日以滋廬夀舒三州屏蔽上流廬夀既沒舒獨當鋒鏑之衝至正十年壬申進士余闕以淮西元帥之節來鎮廣設方略招徠補葺備戰守豐軍儲賊飲恨不得逞朝廷嘉其功授淮南參知政事自是日與賊遌受圍凡四十有二日大小二百餘戰江西賴以茍安坐視弗援十六年冬别將胡敗沒漏師明年春紅巾海天鵝數千艘突入內柵公率衆殊死戰奪其船降數千人斬首千餘級冦慙憤引郤九月復至出戰不利四面攻圍雲梯登城城上壓以木石死者甚衆伏兵又擊殺數百人賊懼謀退諜知城中糧盡益急攻十八年正月丙午城遂陷公一門爭先赴死闔郡無一生降賊黨舉手加額稱余元帥天下一人購得其尸城下池中禮葬之傷哉寄痛哭於長歌使後人哀也公西夏世家字廷心貌不逾中人當紀綱廢弛之餘治郡立朝每與衆異故其樹立如此崑崙烈風撼坤軸日車斂轡咸池浴六龍飲渴呼不聞赤蟻玄蜂厭人肉荆襄弗支廬夀孤江東掃地如摧枯忠臣當代誰苐一七載舒州天下無東南此地關形勝天柱之峯屹千仞當年赤壁走曹瞞天為孫吳産公瑾我公千載遙相望﨑嶇恆以弱擊強孤城大小二百戰食盡北拜天無光當關援劒蒼龍吼盡室肯汚姦黨手推鋒闔郡無生降群盜言之皆稽首堂堂省憲羅公卿建官分閫日募兵哀哉坐視無寸䇿遂使流血西江平向來不曉皇穹意名將南征死相繼一時貪暴聚庸才玩冦偷安叨富貴河流浩浩龍門西燕山萬騎攢霜蹄英雄暴骨心未死去作海色催朝雞玉衣飛舞空中見大息孤忠鏖百戰五陵元氣待天還睢陽誰續中丞傳斷臂吟黃埃兒啼夫死官倦投逆旅心骨酸深閨玉臂辱汚賤引斧落之身始安紛紛五季窮爭戰迎送君臣如驛傳天將人紀付女英貞節特從倉卒見傷哉殘形忍顧雛飲血仰天弔影孤間關慟絶妾薄命行止隨地哀故夫征衣屢浣憂泥汚魂招不來迫曛莫妾心自割臂可捐腸斷從夫去時路殘雲低空沒栖烏落月不照秋桑枯泉流出山誓終始取義寧顧千金軀妾悲望鄉淚頻滴兒戀母懷啼繞膝一心抱恨向青天他日山頭願為石武昌栁武昌栁青如許舊恨新愁千萬縷宫鶯去盡野鴉栖憔悴江南誰是主朔風一夕捲栖鴉春日鶯啼憶舊家流落王孫重繫馬雨晴天氣屬楊花代答髙君寫贈老檜圗江東老檜天下竒雪霜鍊骨知者誰幹通碧漢星斗埀野鶴夜過翻雲旗根吐元氣春淋漓蟄龍守護防顛危黑風曠劫海倒吹六合草木紛離披偉哉傲兀永奠基造化留此持坤維髙侯畫逼鄭與祁熟視眼空超等夷氣酣落筆天自隨恍若曲阜林中移崔嵬樛枝蒼蘚皮古藤蔓引怪石欹卷舒坐右乃所宜持贈老拙夫何為祕藏韜櫝時一窺夜中神彩光陸離按圗求索吁然疑被之寶瑟同鼎彛紫霄鸞鳯若可期變化詎容螻蟻欺扶桑萬丈開晴曦特立丹心朝帝畿代作暘谷丹室扶桑之境滄溟通六龍整駕朝王宫大明皇道自兹始天開暘谷嵎夷東方春萬物盡妍美發生亹亹來無窮誰與斂之就一室欲與造化爭成功空虛庭除納草莽窈窕户牗基鴻濛金沙伏火夜氣碧紫霧升鼎朝光紅乾坤闔闢在方寸收拾生意歸壺中從容得之乃吾友祕旨定傳河上翁拄杖敲門慎勿厭與子一笑論參同李潯陽死節歌李侯治潯陽之二載紅巾賊發蘄黃倚蔡醜為聲援勢浸逼郡數告急于省省議調兵武昌興國相繼沒南北道梗潯陽危侯力疾奬率民義誓不與賊俱生郡將悉所部先遁侯轉戰力盡猶持短兵奮擊慷慨指天父子同遇害嗚呼李侯可謂仁義之勇矣彼滔滔者獨何心哉侯家頴川名黼字子威曽祖而下仕皆通顯發身監學泰定丙寅鄉試魁上都丁卯進士第一死節壬辰春年五十有六蜀川會漢投匡廬潯陽之厄江西樞李侯仗節忠貫日存沒誓與城池俱夫何郡將弛練卒世祿忍負私其軀冦來談笑啓關遁坐使邑井成邱墟侯時力疾短兵奮臣首當血心當刳魂歸謁帝慟伏闕塗地肝腦民何辜臣𠂻願瀝付渠答臣首欲飛宜㒒姑誓堅洪壁殱衆醜却掃淮蔡匡全吳黃塵四低黑風淡赤豹騰駕蒼虬呼山川幾劫鑄英氣上遡古昔誰其徒平原汗馬河北重江淮按堵睢陽孤顔張凛凛心未死逈立千載誠相孚況聞有子殊激烈義在從父輕頭顱石頭之袁姑孰卞兩間忠孝何時無紛紛賣降與棄甲仰視汗喘呀長吁推公蓋自元氣立顧盻所取皆詩書當年射䇿首多士已分一念舍無渝朂哉謀國慎所托古今大勇惟真儒豫章吟蔡頴搆逆掩襄披淮蘄黃響應武昌巨鎮灰滅一朝順流而東指顧間無江西矣有大臣平章公道通盡忠報國左丞致事章巴延赴難多智練兵二三才賢相與協謀匡贊守禦備周賊鋭攻城屢進屢衄凡五十有四日竟底散亡戰船千艘無一返馬步幾空蓋自竊發以來未遇堅敵至此方知國家有人氣塞不敢復肆郡縣克復恃以心安不世出之竒功也不可以不述作豫章吟紫袍相國金虎符左丞鐡面頳虬鬚劫灰飛空海化陸兩公奮起全洪都武昌路絶荆淮餉秦涼逺隔黃河上秋風無鴈到江南百戰孤城天下壯承平當日儲兩公天豈無意生英雄神光夜夜動牛斗倣佛氣與微垣通九關夢寐傳消息歸來飲馬東湖碧湖邉髙士宅巋然餘韻流風凛如昔山川間氣久封培一時將佐皆英才相從報國誓終始指顧四逺風雲開功成彛鼎銘千古廟食他年軼張許北來鞍馬衆羇臣日長來此聽鼙鼓宜春將軍取印歌冦逼袁州萬户某棄印走贑義士彭志凱力戰完城印失復得七月萬户自贑還忌其功取印忤意尋殺之袁竟不守作取印歌宜春將軍虎頭去金印别來不知處故城血戰印通天飛落彭郎劒鋒住西風匹馬將軍歸慿陵取印藏禍機彭郎性命賤於土義士投甲無光輝印乎涉難羞含垢我欲勸君一杯酒天閽可叩飛訴寃歸來却取將軍首孤隼歎燮理俞詢河西人白衣受府辟以統軍經厯來壁吾鄉州同知托歡達實密者貪冒喪師律當坐徼幸以賂免營求繼至故撓其權迫使他去挾姦吏玩冦營私民稍自給者不幸為吏所知即中以竒禍盡覆其家慨思燮理不可已燮理廉而文工水墨慷慨自負惜武略非所長河西萬里來孤隼側目煙埃心未逞黠梟自詭産隂山失勢包羞茍逃命咄哉隼去梟獨留引類呼儔肆殘忍毒蛇見面即喚名怪蟲含沙工射影十家屏息九杜門恨不移居托眢井梟鳴餧肉羣飛翔草間狐兔儘陸梁細思物極理當反安得儀鳯鳴朝陽嗚呼安得儀鳯鳴朝陽征西謠邑同知線去嵗領兵西行嗜利深入冦埀險迫之委其衆奔還義丁積骸遍野存者十無二三郡吏受賕舞文末減其罪今復承檄來南賂吏之資悉取償焉去年征西喪師旅暮夜懷金首如鼠吏姦嗜賄務欺暪僉謂罪疑兵氣沮一官失律忍致刑萬夫性命何其輕羣邪逞志忠義屈無怪冦至無堅城今兹又復遷南戍漁獵編氓償宿負紛紛行伍被餘風迎望賊旗盡回顧竊聞上方龍劒昨哀鳴為我提此斬血官街淋併取貪吏刳其心兵前鼓朝衙撡撾出近午暮歸斷續卒三伍鼓聲秪以迎送神漫把旗旄揭飛虎鋒交昨者沒旗頭今晨隊長血髑髏貴人按轡不為動但訝日食無珍羞領兵官晏出早還鄉人多以供頓弗備受責戎徒抵掌羣嘲戲志士拊膺殊奪氣朝朝暮暮鼓鼕鼕吸膏敲髓了無愧張侯援枹華三周禰衡正色披岑牟世間壯士古來有此聲慷慨曽聞不農謠萬田草生農務忙飯牛夜半飢且僵侵晨荷耒散阡陌和買犒軍官取將髙堂大嚼飲繼燭持遺妻子豐括囊官吏飽足之後復以大囊滿貯送至其家蒼頭廬兒飽欲死義丁疇敢染指嘗鋤耰謾勞犢方稚十步九頓空倣徨將軍大笑不負腹東臯南畝從渠荒牛魚些東郊服牛秧未移前者掠取稱犒師南湖蓄魚家賈販昨朝一網俱無遺味甘得計啓貪虐日揣編户鑽其肌網羅已遍閭左右根括流寓窮刀錐總兵三月官四易方春殆若秋慘悽誰能反此思報國建功何事不肯為和劉以耕孤笻吟以耕一笻二十載屢失復還寄興長吟和答以廣其意亂離一飯奔走難柴門長掩白晝間埀堂有戒古所慎從教世俗嘲癡頑羡君草載吟笻友髙節曽經遮日手嶙峋但覺霜滿懷錯落初疑月穿牖顛危必假厚意將論功掖老殊家鄉化龍縮地托靈物刻鳩祝饐頒明堂晴泥暫屈溪橋去布襪青鞋尋别墅詩成緩步藉敲門飛落梅香殘雪處平生密物拄媻姍去如得之珠浦還結交自是羞少壯用世要當超險艱秋風古驛三義路五斗折腰徑須賦百錢留與阮郎看咫尺康莊宜小住何時花栁滿前川邂逅相倚為忘年提攜有地春未晚試叩酒家堅宿緣蕨根歎園蔬凍芽委邏卒舊穀未春先已沒嗷嗷待哺啼且號極目山南際山北飛仙絶粒那可致異書鳥迹尤荒忽短鉏單布霜雪餘起逐蕨根延命脈雞鳴裹飯衆相呼日晏山深行兀兀窮幽逺取志躋攀冒險旁搜任顛踣背糧腰僂經信宿陟巘緣岡拾魂魄千夫篝火斷崖隂夜半風酸毒穿骨手皴棘蔓凌虎穴膽掉巉巗撼龍窟不憂土痛損春心且慰尫殘蘇頃刻爨灰一旦死復燃功與堇荼相什伯反思疇昔馬厭穀粱肉沉酣遍臧獲道傍掉臂唾枯朽條達始為樵者得焉知屑玉貯縑繒舂磨殷勤沐膏澤爛然光采升鼎俎白璧黃金皆瓦礫物情貴賤竟何常慎勿間時輕棄擲飢相食轉輸餉官傾富室米石萬錢無處糴連村鬼哭竈沉煙野攫生人腥血赤九疑對面森可畏弱肉半為強者食旋風吹棘晝梟鳴缺月銜山虎留迹提攜匕首析扊扅狼藉剔剜碎燔炙恍疑逆祀禱恣睢復恐老叨儕盜跖幽幽怨魂忍葬心腐脅穿腸憤無術髑髏抱痛宜有知上訴帝閽吐寃抑我生白頭駭見此矯首蒼穹淚沾臆北山有蕨南澗蘋旦暮可湘心匪石青春鳩化逐蒼鷹黃口蛇吞來義鶻物情感召尚如此同類何辜自相賊興言使我立廢餐推案拊膺衷奮激鞠囚誰料殞炭甕立法竟嗟離舍匿後人幾度哀後人萬劫相尋豈終極昨來偶值鄰翁坐且説舟航好消息浙江白粲載如山相送大軍來有日一朝菜色變歡顔怪事書空自氷釋送周士能赴都洛陽花開官酒濃紫衣乘傳春如龍海氛一夕泯無迹坐致江漢之朝宗君行逺度黃河北北上都門瞻曉色故人列職省垣深頗念江南老賔客哈瑪爾未相時貶南安士能以縣典史出入承奉及赴召歸北其子叔諒從之保入憲臺况今有子翔亨衢日邉西寄思親書柏臺晝永間案牘綵服喜就京華趨送君此去青雲立太史列卿宜俯拾至尊前席問蒼生何者最為先務急吏深持律舞二端縉紳逺迹廉恥間鈞衡于此試留意談笑四海俱歡顔丁馬謠為丁博斯呼馬哈瑪爾作兵興連嵗賄賂公行上功省垣輒為吏議所抑控弦飛騎丁無前䇿名百户今四年冦鋒如林深冒險五載軍中馬巡檢翩翩旗尾風雲髙醜類聞之潛遁逃朝家爵賞褒忠義幕府上功從吏議戴天履地皆君恩小臣分寸何足論悲東姚州東姚正叔奮起擊賊不受爵賞一門死事數冦連嵗不得逞志安成正叔力也乙未夏五月逺冦悉鋭而進衡頭衆背正叔潛與冦通間道直抵寨下正叔麾所部力戰舉旗招援兵監州普刺同知托歡達實密擁兵咫尺素忌其能衆踴躍求自效二人力遏之姚死安成陷冦遂根盤姚所居小橋頭過者無不流涕吾州姚氏城東營四年殺賊不為名一門忠義死相繼報國何重身何輕無端毒蛇生肘腋衡頭之人噓送黑雲朝蔽日絛鷹咫尺呼不來監州同知瞬息東藩失堅壁老姚忠血赤貫天江南野史何人傳殞身三世匪官守異日合置忠臣先郡兵北來思蓄鋭羣盜憑城轉無忌請看婦女與兒童説著姚家總埀淚布延副使政績歌壬辰冦陷武昌順流而下省郎中布延布哈諗于衆曰若其直搗真揚事未可知倘轉而南無能為矣吾受國厚恩發身監學忝進士先誓死必報遣人間道馳書奉百金歸别父母建議盡徹城外民居冦始渡江官軍小衄母弟佛努死之公單騎殿小橋冦不敢逼衆遂翕從奉平章公道通左丞章巴延竭志守城逆黨雲集攻圍五十有四日大敗而還散亡略盡江南遂為天下雄非公長才贊畫平章左丞聽用其言詎至是哉朝廷論功除本道廉訪副使于是公之惠愈無窮矣逺近士大夫作為公歌詩誦其美俟太史氏擇焉公世家山東希古其字也邑士劉子真近歸自洪具道本末如此近時有客湖上歸能話郎中身許國朝廷取士數十年誰謂書生無寸䇿江州李侯死可書郎中百戰全洪都昔年廷對俱苐一鸞鳯固與羣飛殊當其練兵首陳義謂賊南征非所忌環城徹屋民始疑事急方知為上計家書間道馳山東百金歸報夀乃翁小臣於此誓生死仰視白日昭其忠朔風雲低吹戰血母弟魂歸寶刀折倉皇徑氣吐寸心立馬危橋萬夫決相臣攬轡從天回將軍鞞鼓轟春雷為公破敵捐萬死顧盻妖賊如山摧君王拊髀加褒異深副當年設科意碧霄雨露湛恩深官轉霜臺𢎞國器漢廷寥寥渤海龔廣陵張綱尤罕逢使君宴坐試深省談笑憲府看平戎石初集卷二
